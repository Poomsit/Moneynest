<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MoneyNest V0.3</title>

<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#F4FAF7;
  --green:#2E9D7A;
  --red:#ff5c5c;
  --card:#fff;
  --text:#1f2d2a;
  --muted:#6b7c78;
}

*{font-family:'Sarabun';box-sizing:border-box;}
body{margin:0;background:var(--bg);color:var(--text);}

.app{max-width:420px;margin:auto;padding-bottom:80px}

/* HEADER */
.header{
  background:linear-gradient(135deg,#66C7A0,#2E9D7A);
  color:white;
  padding:20px;
  border-radius:0 0 20px 20px;
}

.header h1{margin:0;font-size:20px;}
.header p{margin:5px 0 0;font-size:12px;opacity:.9}

/* SUMMARY */
.summary{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:15px;
}

.box{
  background:rgba(255,255,255,.15);
  padding:10px;
  border-radius:14px;
}

.box h3{margin:0;font-size:12px;}
.box div{font-size:18px;font-weight:700;margin-top:5px}

/* FORM */
.form{
  background:#fff;
  margin:15px;
  padding:12px;
  border-radius:16px;
  box-shadow:0 6px 16px rgba(0,0,0,.05);
}

input,select{
  width:100%;
  padding:10px;
  margin-top:6px;
  border-radius:10px;
  border:1px solid #ddd;
}

button{
  width:100%;
  margin-top:10px;
  padding:12px;
  border:none;
  border-radius:12px;
  background:var(--green);
  color:white;
  font-weight:700;
}

/* LIST */
.list{padding:0 15px}

.item{
  background:#fff;
  padding:12px;
  border-radius:14px;
  margin-bottom:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.left{
  display:flex;
  flex-direction:column;
}

.cat{font-weight:700}
.note{font-size:12px;color:var(--muted)}

.amount{
  font-weight:700;
}

.expense{color:var(--red)}
.income{color:var(--green)}

.del{
  border:none;
  background:none;
  color:#999;
  font-size:16px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="app">

  <!-- HEADER -->
  <div class="header">
    <h1>💰 MoneyNest V0.3</h1>
    <p>ระบบบันทึกรายรับรายจ่ายใช้งานจริง</p>

    <div class="summary">
      <div class="box">
        <h3>รายรับ</h3>
        <div id="income">0</div>
      </div>
      <div class="box">
        <h3>รายจ่าย</h3>
        <div id="expense">0</div>
      </div>
    </div>
  </div>

  <!-- FORM -->
  <div class="form">
    <select id="type">
      <option value="income">รายรับ</option>
      <option value="expense">รายจ่าย</option>
    </select>

    <input id="amount" type="number" placeholder="จำนวนเงิน">
    <input id="note" placeholder="หมายเหตุ">

    <button onclick="addItem()">+ เพิ่มรายการ</button>
  </div>

  <!-- LIST -->
  <div class="list" id="list"></div>

</div>

<script>
let data = JSON.parse(localStorage.getItem("moneynest") || "[]");

function save(){
  localStorage.setItem("moneynest", JSON.stringify(data));
}

function addItem(){
  const type = document.getElementById("type").value;
  const amount = Number(document.getElementById("amount").value);
  const note = document.getElementById("note").value;

  if(!amount) return;

  data.push({
    id:Date.now(),
    type,
    amount,
    note
  });

  document.getElementById("amount").value="";
  document.getElementById("note").value="";

  save();
  render();
}

function del(id){
  data = data.filter(i=>i.id!==id);
  save();
  render();
}

function render(){

  let income = 0;
  let expense = 0;

  const list = document.getElementById("list");
  list.innerHTML = "";

  data.slice().reverse().forEach(i=>{
    if(i.type==="income") income += i.amount;
    else expense += i.amount;

    list.innerHTML += `
      <div class="item">
        <div class="left">
          <div class="cat">${i.type==="income"?"💰 รายรับ":"💸 รายจ่าย"}</div>
          <div class="note">${i.note || "-"}</div>
        </div>

        <div style="display:flex;align-items:center;gap:10px;">
          <div class="amount ${i.type}">
            ${i.type==="income"?"+" : "-"}${i.amount}
          </div>
          <button class="del" onclick="del(${i.id})">✕</button>
        </div>
      </div>
    `;
  });

  document.getElementById("income").innerText = income;
  document.getElementById("expense").innerText = expense;
}

render();
</script>

</body>
</html>
