<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>MoneyNest 🐦</title>
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{margin:0;background:#CBE9D8;font-family:'Prompt','Sarabun',sans-serif;min-height:100vh;}
input,button{font-family:'Prompt','Sarabun',sans-serif;}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:#A7E3C2;border-radius:4px;}
input[type="date"]::-webkit-calendar-picker-indicator{opacity:.5;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect,useCallback,useRef}=React;

/* ── CONSTANTS ─────────────────────────────────────── */
const CUR={
  THB:{code:"THB",symbol:"฿",name:"บาทไทย",  flag:"🇹🇭",dec:2},
  KRW:{code:"KRW",symbol:"₩",name:"วอนเกาหลี",flag:"🇰🇷",dec:0},
  JPY:{code:"JPY",symbol:"¥",name:"เยนญี่ปุ่น",flag:"🇯🇵",dec:0},
};
const RATES={THB:1,KRW:0.026,JPY:0.23};
const toTHB=(a,c)=>a*RATES[c];
const fromTHB=(a,c)=>a/RATES[c];
const fmtN=(n,c)=>{
  const d=CUR[c].dec,v=d===0?Math.round(n):n;
  return v.toLocaleString(c==="THB"?"th-TH":c==="KRW"?"ko-KR":"ja-JP",{minimumFractionDigits:d,maximumFractionDigits:d});
};
const CATS=[
  {id:"food",   icon:"🍔",label:"อาหาร",   color:"#66C7A0",t:"expense"},
  {id:"travel", icon:"✈️",label:"เดินทาง", color:"#60A5FA",t:"expense"},
  {id:"home",   icon:"🏠",label:"บ้าน",     color:"#F59E0B",t:"expense"},
  {id:"health", icon:"💊",label:"สุขภาพ",  color:"#FF6B9D",t:"expense"},
  {id:"shop",   icon:"🛍️",label:"ช้อปปิ้ง",color:"#A78BFA",t:"expense"},
  {id:"fun",    icon:"🎮",label:"บันเทิง", color:"#F97316",t:"expense"},
  {id:"salary", icon:"💰",label:"เงินเดือน",color:"#2E9D7A",t:"income"},
  {id:"other",  icon:"⋯",label:"อื่นๆ",   color:"#8E8E93",t:"both"},
];
const CM=Object.fromEntries(CATS.map(c=>[c.id,c]));
const G={
  green:"#2E9D7A",m3:"#66C7A0",m2:"#A7E3C2",m1:"#C8F0D9",
  bg:"#F0FAF5",white:"#FFFFFF",text:"#1A3D2B",sub:"#6B8C7A",
  red:"#E05555",pink:"#FFB4C1",border:"#DCF1E7",
};
const uid=()=>Math.random().toString(36).slice(2,9);
const todayStr=()=>new Date().toISOString().slice(0,10);
const fmtDate=iso=>new Date(iso).toLocaleDateString("th-TH",{day:"numeric",month:"short",year:"2-digit"});
const LS={
  get:(k,d)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch{return d;}},
  set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}},
};

/* ── SMALL COMPONENTS ──────────────────────────────── */
const Card=({children,style})=>(
  <div style={{background:G.white,borderRadius:18,padding:16,boxShadow:"0 2px 12px rgba(46,157,122,0.07)",...style}}>{children}</div>
);
const PBar=({pct,color=G.green})=>(
  <div style={{background:G.m1,borderRadius:99,height:8,overflow:"hidden"}}>
    <div style={{width:`${Math.min(pct,100)}%`,background:color,height:"100%",borderRadius:99,transition:"width .4s"}}/>
  </div>
);
const Bird=()=>(
  <svg width={30} height={30} viewBox="0 0 48 48" fill="none">
    <ellipse cx="24" cy="28" rx="14" ry="12" fill={G.m3}/>
    <ellipse cx="24" cy="20" rx="10" ry="10" fill={G.green}/>
    <ellipse cx="20" cy="18" rx="2.5" ry="2.5" fill="white"/>
    <circle cx="20" cy="18" r="1" fill="#1A3D2B"/>
    <path d="M30 22 Q35 20 33 26 Q30 24 30 22Z" fill={G.m1}/>
    <path d="M17 26 Q12 30 14 36 Q20 34 17 26Z" fill={G.m2}/>
    <path d="M31 26 Q36 30 34 36 Q28 34 31 26Z" fill={G.m2}/>
    <ellipse cx="24" cy="22" rx="3" ry="2" fill="#FFB347"/>
  </svg>
);

/* ── NUMPAD ─────────────────────────────────────────── */
function NumPad({value,onChange,cur}){
  const press=k=>{
    if(k==="⌫"){onChange(value.length>1?value.slice(0,-1):"0");return;}
    if(k==="."&&CUR[cur].dec===0)return;
    if(k==="."&&value.includes("."))return;
    if(value==="0"&&k!==".")return onChange(k);
    if(value.length>=11)return;
    onChange(value+k);
  };
  return(
    <div>
      <div style={{textAlign:"center",padding:"10px 0 8px"}}>
        <div style={{fontSize:11,color:G.sub,fontWeight:600,marginBottom:4}}>{CUR[cur].flag} {CUR[cur].name}</div>
        <div style={{fontSize:38,fontWeight:800,color:G.text,letterSpacing:-1}}>
          {CUR[cur].symbol}{Number(value||0).toLocaleString()}
        </div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8}}>
        {["7","8","9","4","5","6","1","2","3",".","0","⌫"].map(k=>(
          <button key={k} onClick={()=>press(k)}
            style={{background:k==="⌫"?G.m1:G.bg,border:`1px solid ${G.border}`,borderRadius:14,padding:"14px 0",
              fontSize:k==="⌫"?20:22,fontWeight:700,color:G.text,cursor:"pointer",fontFamily:"inherit",outline:"none"}}>
            {k}
          </button>
        ))}
      </div>
    </div>
  );
}

/* ── HOME ───────────────────────────────────────────── */
function HomeScreen({txns,cur,setScreen}){
  const now=new Date();
  const mk=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,"0")}`;
  const mt=txns.filter(t=>t.date.startsWith(mk));
  const inc=mt.filter(t=>t.type==="income").reduce((s,t)=>s+toTHB(t.amount,t.currency),0);
  const exp=mt.filter(t=>t.type==="expense").reduce((s,t)=>s+toTHB(t.amount,t.currency),0);
  const bal=inc-exp;
  const pct=inc>0?Math.round(exp/inc*100):0;
  const sym=CUR[cur].symbol;
  const recent=[...txns].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,5);
  return(
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      <div style={{background:`linear-gradient(135deg,${G.green},${G.m3})`,borderRadius:24,padding:"22px 20px",color:"#fff",position:"relative",overflow:"hidden"}}>
        <div style={{position:"absolute",top:-30,right:-30,width:120,height:120,borderRadius:"50%",background:"rgba(255,255,255,0.08)"}}/>
        <div style={{fontSize:12,opacity:.85,marginBottom:2}}>
          {now.toLocaleDateString("th-TH",{month:"long",year:"numeric"})}
        </div>
        <div style={{fontSize:11,opacity:.7,marginBottom:6}}>{CUR[cur].flag} แสดงผลเป็น{CUR[cur].name}</div>
        <div style={{fontSize:32,fontWeight:800,letterSpacing:-1,marginBottom:10}}>
          {bal<0?"-":""}{sym}{fmtN(Math.abs(fromTHB(bal,cur)),cur)}
        </div>
        <div style={{display:"flex",marginBottom:10}}>
          {[{l:"รายรับ",v:inc},{l:"รายจ่าย",v:exp}].map((r,i)=>(
            <div key={i} style={{flex:1}}>
              <div style={{fontSize:11,opacity:.8}}>{r.l}</div>
              <div style={{fontSize:14,fontWeight:700}}>{sym}{fmtN(fromTHB(r.v,cur),cur)}</div>
            </div>
          ))}
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:11,opacity:.8}}>ใช้ไปแล้ว</div>
            <div style={{fontSize:22,fontWeight:800}}>{pct}%</div>
          </div>
        </div>
        <PBar pct={pct} color="rgba(255,255,255,0.85)"/>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        {[
          {l:"เพิ่มรายรับ",i:"💰",bg:G.m1,s:"add-income"},
          {l:"เพิ่มรายจ่าย",i:"💸",bg:"#FFE4E4",s:"add-expense"},
        ].map(a=>(
          <button key={a.l} onClick={()=>setScreen(a.s)}
            style={{background:a.bg,border:"none",borderRadius:16,padding:"14px",cursor:"pointer",display:"flex",alignItems:"center",gap:10,textAlign:"left",outline:"none"}}>
            <span style={{fontSize:26}}>{a.i}</span>
            <span style={{fontSize:13,fontWeight:700,color:G.text}}>{a.l}</span>
          </button>
        ))}
      </div>

      <Card>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:12}}>
          <span style={{fontSize:14,fontWeight:700,color:G.text}}>รายการล่าสุด</span>
          <button onClick={()=>setScreen("history")}
            style={{background:"none",border:"none",color:G.green,fontSize:12,fontWeight:600,cursor:"pointer",outline:"none"}}>
            ดูทั้งหมด ›
          </button>
        </div>
        {recent.length===0&&(
          <div style={{textAlign:"center",padding:"20px 0",color:G.sub,fontSize:13}}>
            ยังไม่มีรายการ 🐦<br/>กดปุ่ม + เพื่อเพิ่มรายการ
          </div>
        )}
        {recent.map((t,i)=>{
          const cat=CM[t.category]||CM.other;
          const disp=fromTHB(toTHB(t.amount,t.currency),cur);
          return(
            <div key={t.id} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 0",borderTop:i>0?`1px solid ${G.border}`:"none"}}>
              <div style={{width:40,height:40,borderRadius:12,background:cat.color+"22",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>{cat.icon}</div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:13,fontWeight:600,color:G.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.note||cat.label}</div>
                <div style={{fontSize:11,color:G.sub}}>{fmtDate(t.date)} · {CUR[t.currency].flag}</div>
              </div>
              <div style={{fontSize:14,fontWeight:700,color:t.type==="income"?G.green:G.red,flexShrink:0}}>
                {t.type==="income"?"+":"-"}{CUR[cur].symbol}{fmtN(disp,cur)}
              </div>
            </div>
          );
        })}
      </Card>
    </div>
  );
}

/* ── ADD ────────────────────────────────────────────── */
function AddScreen({type,cur,onSave,goBack}){
  const [amount,setAmount]=useState("0");
  const [cat,setCat]=useState(type==="income"?"salary":"food");
  const [note,setNote]=useState("");
  const [date,setDate]=useState(todayStr());
  const [txnCur,setTxnCur]=useState(cur);
  const cats=CATS.filter(c=>type==="income"?c.t==="income"||c.t==="both":c.t==="expense"||c.t==="both");
  const save=()=>{
    if(Number(amount)<=0)return;
    onSave({id:uid(),type,amount:Number(amount),currency:txnCur,category:cat,note,date});
    goBack();
  };
  return(
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
        <button onClick={goBack} style={{background:"none",border:"none",fontSize:22,cursor:"pointer",color:G.text,outline:"none",padding:"0 4px"}}>‹</button>
        <span style={{fontSize:17,fontWeight:700,color:G.text}}>{type==="income"?"เพิ่มรายรับ 💰":"เพิ่มรายจ่าย 💸"}</span>
      </div>

      <div style={{display:"flex",gap:8}}>
        {Object.values(CUR).map(c=>(
          <button key={c.code} onClick={()=>setTxnCur(c.code)}
            style={{flex:1,border:`2px solid ${txnCur===c.code?G.green:G.border}`,borderRadius:14,padding:"10px 4px",
              background:txnCur===c.code?G.m1:G.white,cursor:"pointer",textAlign:"center",outline:"none",transition:"all .15s"}}>
            <div style={{fontSize:22}}>{c.flag}</div>
            <div style={{fontSize:12,fontWeight:700,color:txnCur===c.code?G.green:G.sub}}>{c.code}</div>
            <div style={{fontSize:10,color:G.sub}}>{c.symbol}</div>
          </button>
        ))}
      </div>

      <Card style={{padding:"12px 16px"}}>
        <NumPad value={amount} onChange={setAmount} cur={txnCur}/>
      </Card>

      <Card>
        <div style={{fontSize:13,fontWeight:700,color:G.text,marginBottom:10}}>หมวดหมู่</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8}}>
          {cats.map(c=>(
            <button key={c.id} onClick={()=>setCat(c.id)}
              style={{border:`2px solid ${cat===c.id?G.green:"transparent"}`,borderRadius:12,padding:"8px 4px",
                background:cat===c.id?G.m1:G.bg,cursor:"pointer",textAlign:"center",outline:"none"}}>
              <div style={{fontSize:20}}>{c.icon}</div>
              <div style={{fontSize:10,color:G.text,marginTop:3,fontWeight:cat===c.id?700:400}}>{c.label}</div>
            </button>
          ))}
        </div>
      </Card>

      <Card style={{display:"flex",flexDirection:"column",gap:10}}>
        <input value={note} onChange={e=>setNote(e.target.value)} placeholder="บันทึก (ไม่บังคับ)"
          style={{border:`1px solid ${G.border}`,borderRadius:10,padding:"10px 12px",fontSize:14,color:G.text,outline:"none",background:G.bg,width:"100%"}}/>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <span style={{fontSize:13,color:G.sub,flexShrink:0}}>📅 วันที่:</span>
          <input type="date" value={date} onChange={e=>setDate(e.target.value)}
            style={{border:`1px solid ${G.border}`,borderRadius:10,padding:"8px 10px",fontSize:13,color:G.text,outline:"none",background:G.bg,flex:1}}/>
        </div>
      </Card>

      <button onClick={save} disabled={Number(amount)<=0}
        style={{background:Number(amount)>0?(type==="income"?G.green:G.red):"#ccc",color:"#fff",border:"none",
          borderRadius:14,padding:"14px 0",fontWeight:700,fontSize:15,cursor:Number(amount)>0?"pointer":"default",
          fontFamily:"inherit",width:"100%",outline:"none"}}>
        💾 บันทึก{type==="income"?"รายรับ":"รายจ่าย"}
      </button>
    </div>
  );
}

/* ── HISTORY ────────────────────────────────────────── */
function HistoryScreen({txns,cur,onDelete,goBack}){
  const [filter,setFilter]=useState("all");
  const [search,setSearch]=useState("");
  const list=txns
    .filter(t=>filter==="all"||t.type===filter)
    .filter(t=>!search||(t.note||"").includes(search)||(CM[t.category]?.label||"").includes(search))
    .sort((a,b)=>b.date.localeCompare(a.date));
  const totInc=list.filter(t=>t.type==="income").reduce((s,t)=>s+toTHB(t.amount,t.currency),0);
  const totExp=list.filter(t=>t.type==="expense").reduce((s,t)=>s+toTHB(t.amount,t.currency),0);
  const sym=CUR[cur].symbol;
  return(
    <div>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:14}}>
        <button onClick={goBack} style={{background:"none",border:"none",fontSize:22,cursor:"pointer",color:G.text,outline:"none"}}>‹</button>
        <span style={{fontSize:17,fontWeight:700,color:G.text}}>ประวัติรายการ</span>
      </div>
      <div style={{display:"flex",gap:6,marginBottom:10}}>
        {[["all","ทั้งหมด"],["income","รายรับ"],["expense","รายจ่าย"]].map(([k,l])=>(
          <button key={k} onClick={()=>setFilter(k)}
            style={{flex:1,border:"none",borderRadius:10,padding:"8px 0",background:filter===k?G.green:G.m1,
              color:filter===k?"#fff":G.text,fontWeight:600,cursor:"pointer",fontSize:12,fontFamily:"inherit",outline:"none"}}>
            {l}
          </button>
        ))}
      </div>
      <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 ค้นหา..."
        style={{width:"100%",border:`1px solid ${G.border}`,borderRadius:12,padding:"10px 14px",fontSize:13,
          outline:"none",background:G.white,marginBottom:10}}/>
      <Card style={{marginBottom:12}}>
        <div style={{display:"flex"}}>
          {[{l:"รายรับ",v:totInc,c:G.green},{l:"รายจ่าย",v:totExp,c:G.red}].map((r,i)=>(
            <div key={i} style={{flex:1,textAlign:"center",borderRight:i===0?`1px solid ${G.border}`:"none"}}>
              <div style={{fontSize:11,color:G.sub}}>{r.l}</div>
              <div style={{fontSize:15,fontWeight:800,color:r.c}}>{sym}{fmtN(fromTHB(r.v,cur),cur)}</div>
            </div>
          ))}
        </div>
      </Card>
      {list.length===0&&<div style={{textAlign:"center",padding:"40px 0",color:G.sub,fontSize:14}}>ไม่มีรายการ 🐦</div>}
      <div style={{display:"flex",flexDirection:"column",gap:8}}>
        {list.map(t=>{
          const cat=CM[t.category]||CM.other;
          const disp=fromTHB(toTHB(t.amount,t.currency),cur);
          return(
            <Card key={t.id} style={{display:"flex",alignItems:"center",gap:12}}>
              <div style={{width:42,height:42,borderRadius:12,background:cat.color+"22",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>{cat.icon}</div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:13,fontWeight:600,color:G.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.note||cat.label}</div>
                <div style={{fontSize:11,color:G.sub}}>{fmtDate(t.date)}</div>
                {t.currency!==cur&&(
                  <div style={{fontSize:10,color:G.m3}}>
                    {CUR[t.currency].symbol}{fmtN(t.amount,t.currency)} → {sym}{fmtN(disp,cur)}
                  </div>
                )}
              </div>
              <div style={{textAlign:"right",flexShrink:0}}>
                <div style={{fontSize:13,fontWeight:700,color:t.type==="income"?G.green:G.red}}>
                  {t.type==="income"?"+":"-"}{sym}{fmtN(disp,cur)}
                </div>
                <div style={{fontSize:10,color:G.sub}}>{CUR[t.currency].flag} {t.currency}</div>
                <button onClick={()=>onDelete(t.id)}
                  style={{background:"none",border:"none",color:"#ccc",fontSize:13,cursor:"pointer",outline:"none"}}>🗑</button>
              </div>
            </Card>
          );
        })}
      </div>
    </div>
  );
}

/* ── REPORT ─────────────────────────────────────────── */
function ReportScreen({txns,cur}){
  const [period,setPeriod]=useState("month");
  const now=new Date();
  const key=period==="month"
    ?`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,"0")}`
    :`${now.getFullYear()}`;
  const ft=txns.filter(t=>t.date.startsWith(key));
  const inc=ft.filter(t=>t.type==="income").reduce((s,t)=>s+toTHB(t.amount,t.currency),0);
  const exp=ft.filter(t=>t.type==="expense").reduce((s,t)=>s+toTHB(t.amount,t.currency),0);
  const sym=CUR[cur].symbol;
  const byCat={};
  ft.filter(t=>t.type==="expense").forEach(t=>{byCat[t.category]=(byCat[t.category]||0)+toTHB(t.amount,t.currency);});
  const catRows=Object.entries(byCat).sort((a,b)=>b[1]-a[1]);
  const months=Array.from({length:6},(_,i)=>{
    const d=new Date(now.getFullYear(),now.getMonth()-5+i,1);
    return{key:`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`,label:d.toLocaleDateString("th-TH",{month:"short"})};
  });
  const mData=months.map(m=>{
    const mt=txns.filter(t=>t.date.startsWith(m.key));
    return{...m,
      inc:mt.filter(t=>t.type==="income").reduce((s,t)=>s+toTHB(t.amount,t.currency),0),
      exp:mt.filter(t=>t.type==="expense").reduce((s,t)=>s+toTHB(t.amount,t.currency),0)
    };
  });
  const maxB=Math.max(...mData.map(m=>Math.max(m.inc,m.exp)),1);
  const byCur={};
  ft.forEach(t=>{byCur[t.currency]=(byCur[t.currency]||0)+1;});
  return(
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      <div style={{fontSize:18,fontWeight:800,color:G.text}}>รายงาน 📊</div>
      <div style={{display:"flex",gap:6}}>
        {[["month","เดือนนี้"],["year","ปีนี้"]].map(([k,l])=>(
          <button key={k} onClick={()=>setPeriod(k)}
            style={{flex:1,border:"none",borderRadius:10,padding:"9px 0",background:period===k?G.green:G.m1,
              color:period===k?"#fff":G.text,fontWeight:600,cursor:"pointer",fontSize:13,fontFamily:"inherit",outline:"none"}}>
            {l}
          </button>
        ))}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}>
        {[{l:"รายรับ",v:inc,c:G.green},{l:"รายจ่าย",v:exp,c:G.red},{l:"คงเหลือ",v:inc-exp,c:inc-exp>=0?G.green:G.red}].map((r,i)=>(
          <Card key={i} style={{textAlign:"center",padding:"12px 8px"}}>
            <div style={{fontSize:10,color:G.sub}}>{r.l}</div>
            <div style={{fontSize:12,fontWeight:800,color:r.c,marginTop:3}}>{sym}{fmtN(fromTHB(r.v,cur),cur)}</div>
          </Card>
        ))}
      </div>
      <Card>
        <div style={{fontSize:13,fontWeight:700,color:G.text,marginBottom:12}}>6 เดือนล่าสุด</div>
        <div style={{display:"flex",alignItems:"flex-end",gap:4,height:90}}>
          {mData.map(m=>(
            <div key={m.key} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
              <div style={{width:"100%",display:"flex",gap:2,alignItems:"flex-end",height:70}}>
                <div style={{flex:1,background:G.m2,borderRadius:"4px 4px 0 0",height:`${(m.inc/maxB)*100}%`,minHeight:m.inc>0?4:0}}/>
                <div style={{flex:1,background:"#FFB4C1",borderRadius:"4px 4px 0 0",height:`${(m.exp/maxB)*100}%`,minHeight:m.exp>0?4:0}}/>
              </div>
              <span style={{fontSize:9,color:G.sub}}>{m.label}</span>
            </div>
          ))}
        </div>
        <div style={{display:"flex",gap:16,marginTop:8,justifyContent:"center"}}>
          {[{c:G.m2,l:"รายรับ"},{c:"#FFB4C1",l:"รายจ่าย"}].map(x=>(
            <div key={x.l} style={{display:"flex",alignItems:"center",gap:4,fontSize:11,color:G.sub}}>
              <div style={{width:14,height:8,background:x.c,borderRadius:2}}/>{x.l}
            </div>
          ))}
        </div>
      </Card>
      {catRows.length>0&&(
        <Card>
          <div style={{fontSize:13,fontWeight:700,color:G.text,marginBottom:12}}>รายจ่ายแยกหมวด</div>
          {catRows.map(([id,val])=>{
            const cat=CM[id]||CM.other;
            const pct=exp>0?Math.round(val/exp*100):0;
            return(
              <div key={id} style={{marginBottom:10}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                  <span style={{fontSize:13,color:G.text}}>{cat.icon} {cat.label}</span>
                  <span style={{fontSize:12,color:G.sub}}>{sym}{fmtN(fromTHB(val,cur),cur)} · {pct}%</span>
                </div>
                <PBar pct={pct} color={cat.color}/>
              </div>
            );
          })}
        </Card>
      )}
      {Object.keys(byCur).length>0&&(
        <Card>
          <div style={{fontSize:13,fontWeight:700,color:G.text,marginBottom:10}}>สกุลเงินที่ใช้</div>
          {Object.entries(byCur).map(([code,count])=>(
            <div key={code} style={{display:"flex",alignItems:"center",gap:10,padding:"6px 0",borderBottom:`1px solid ${G.border}`}}>
              <span style={{fontSize:20}}>{CUR[code].flag}</span>
              <span style={{flex:1,fontSize:13,color:G.text}}>{CUR[code].name}</span>
              <span style={{fontSize:12,fontWeight:600,color:G.green}}>{count} รายการ</span>
            </div>
          ))}
        </Card>
      )}
    </div>
  );
}

/* ── SETTINGS ───────────────────────────────────────── */
function SettingsScreen({cur,setCur,txns,clearAll}){
  const [confirm,setConfirm]=useState(false);
  return(
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      <div style={{fontSize:18,fontWeight:800,color:G.text}}>ตั้งค่า ⚙️</div>
      <Card>
        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:16}}>
          <div style={{width:54,height:54,background:`linear-gradient(135deg,${G.green},${G.m3})`,borderRadius:27,display:"flex",alignItems:"center",justifyContent:"center"}}>
            <Bird/>
          </div>
          <div>
            <div style={{fontSize:16,fontWeight:800,color:G.text}}>MoneyNest 🐦</div>
            <div style={{fontSize:12,color:G.sub}}>{txns.length} รายการทั้งหมด</div>
          </div>
        </div>
        <div style={{fontSize:13,fontWeight:700,color:G.text,marginBottom:10}}>สกุลเงินที่แสดงผล</div>
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {Object.values(CUR).map(c=>(
            <button key={c.code} onClick={()=>setCur(c.code)}
              style={{display:"flex",alignItems:"center",gap:14,padding:"14px",border:`2px solid ${cur===c.code?G.green:G.border}`,
                borderRadius:14,background:cur===c.code?G.m1:G.white,cursor:"pointer",textAlign:"left",outline:"none",transition:"all .2s"}}>
              <span style={{fontSize:28}}>{c.flag}</span>
              <div style={{flex:1}}>
                <div style={{fontSize:14,fontWeight:700,color:G.text}}>{c.name}</div>
                <div style={{fontSize:11,color:G.sub}}>{c.symbol} · {c.code}</div>
              </div>
              {cur===c.code&&<span style={{fontSize:20,color:G.green}}>✓</span>}
            </button>
          ))}
        </div>
      </Card>
      <Card>
        <div style={{fontSize:13,fontWeight:700,color:G.text,marginBottom:8}}>อัตราแลกเปลี่ยน (โดยประมาณ)</div>
        <div style={{fontSize:11,color:G.sub,marginBottom:10}}>ใช้สำหรับแสดงผลเปรียบเทียบ ไม่ใช่อัตราตลาดจริง</div>
        {Object.entries(RATES).map(([code,rate])=>(
          <div key={code} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 0",borderBottom:`1px solid ${G.border}`}}>
            <span style={{fontSize:20}}>{CUR[code].flag}</span>
            <span style={{flex:1,fontSize:13,color:G.text}}>1 {code}</span>
            <span style={{fontSize:13,fontWeight:700,color:G.green}}>= ฿{rate.toLocaleString()}</span>
          </div>
        ))}
      </Card>
      <Card style={{background:"#FFF0F0"}}>
        <div style={{fontSize:13,fontWeight:700,color:G.red,marginBottom:8}}>⚠️ ล้างข้อมูลทั้งหมด</div>
        {!confirm
          ?<button onClick={()=>setConfirm(true)}
              style={{width:"100%",background:"none",border:`1px solid ${G.red}`,borderRadius:12,padding:"10px 0",
                color:G.red,fontWeight:600,cursor:"pointer",fontSize:13,fontFamily:"inherit",outline:"none"}}>
              ลบรายการทั้งหมด
            </button>
          :<div style={{display:"flex",gap:8}}>
            <button onClick={()=>{clearAll();setConfirm(false);}}
              style={{flex:1,background:G.red,border:"none",borderRadius:12,padding:"10px 0",color:"#fff",fontWeight:700,cursor:"pointer",fontSize:13,fontFamily:"inherit",outline:"none"}}>
              ยืนยัน
            </button>
            <button onClick={()=>setConfirm(false)}
              style={{flex:1,background:G.m1,border:"none",borderRadius:12,padding:"10px 0",color:G.text,fontWeight:600,cursor:"pointer",fontSize:13,fontFamily:"inherit",outline:"none"}}>
              ยกเลิก
            </button>
          </div>
        }
      </Card>
    </div>
  );
}

/* ── APP ROOT ────────────────────────────────────────── */
function App(){
  const [txns,setTxns]=useState(()=>LS.get("moneynest-txns",[]));
  const [cur,setCurState]=useState(()=>LS.get("moneynest-cur","THB"));
  const [screen,setScreen]=useState("home");

  const setCur=c=>{setCurState(c);LS.set("moneynest-cur",c);};
  const addTxn=t=>{const n=[t,...txns];setTxns(n);LS.set("moneynest-txns",n);};
  const delTxn=id=>{const n=txns.filter(t=>t.id!==id);setTxns(n);LS.set("moneynest-txns",n);};
  const clearAll=()=>{setTxns([]);LS.set("moneynest-txns",[]);};

  const NAV=[
    {k:"home",   l:"หน้าหลัก",i:"🏠"},
    {k:"history",l:"ประวัติ",  i:"📋"},
    {k:"__add__",l:"",         i:""},
    {k:"report", l:"รายงาน",  i:"📊"},
    {k:"settings",l:"ตั้งค่า",i:"⚙️"},
  ];
  const topK=["home","history","report","settings"];
  const active=topK.includes(screen)?screen:null;

  const render=()=>{
    if(screen==="home")        return <HomeScreen    txns={txns} cur={cur} setScreen={setScreen}/>;
    if(screen==="add-income")  return <AddScreen     type="income"  cur={cur} onSave={addTxn} goBack={()=>setScreen("home")}/>;
    if(screen==="add-expense") return <AddScreen     type="expense" cur={cur} onSave={addTxn} goBack={()=>setScreen("home")}/>;
    if(screen==="history")     return <HistoryScreen txns={txns} cur={cur} onDelete={delTxn} goBack={()=>setScreen("home")}/>;
    if(screen==="report")      return <ReportScreen  txns={txns} cur={cur}/>;
    if(screen==="settings")    return <SettingsScreen cur={cur} setCur={setCur} txns={txns} clearAll={clearAll}/>;
  };

  return(
    <div style={{display:"flex",justifyContent:"center",alignItems:"center",minHeight:"100vh",background:"#CBE9D8",padding:"20px 0"}}>
      <div style={{width:390,maxWidth:"100vw",background:G.bg,borderRadius:40,boxShadow:"0 20px 60px rgba(46,157,122,0.18)",overflow:"hidden",position:"relative",display:"flex",flexDirection:"column"}}>

        {/* status bar */}
        <div style={{background:G.white,padding:"12px 22px 4px",display:"flex",justifyContent:"space-between"}}>
          <span style={{fontSize:13,fontWeight:700,color:G.text}}>
            {new Date().toLocaleTimeString("th-TH",{hour:"2-digit",minute:"2-digit"})}
          </span>
          <div style={{display:"flex",gap:4,fontSize:11}}>📶🔋</div>
        </div>

        {/* header */}
        <div style={{background:G.white,padding:"4px 16px 10px",display:"flex",alignItems:"center",gap:8,borderBottom:`1px solid ${G.border}`}}>
          <Bird/>
          <span style={{fontSize:19,fontWeight:800,color:G.green,letterSpacing:-0.5}}>MoneyNest</span>
          <div style={{marginLeft:"auto",display:"flex",gap:4}}>
            {Object.values(CUR).map(c=>(
              <button key={c.code} onClick={()=>setCur(c.code)}
                style={{border:`1.5px solid ${cur===c.code?G.green:G.border}`,borderRadius:8,padding:"3px 8px",
                  background:cur===c.code?G.m1:G.white,cursor:"pointer",fontSize:11,fontWeight:700,
                  color:cur===c.code?G.green:G.sub,fontFamily:"inherit",outline:"none"}}>
                {c.flag}{c.code}
              </button>
            ))}
          </div>
        </div>

        {/* content */}
        <div style={{flex:1,padding:"18px 18px 100px",overflowY:"auto",maxHeight:"calc(100vh - 180px)",minHeight:500}}>
          {render()}
        </div>

        {/* bottom nav */}
        <div style={{position:"absolute",bottom:0,left:0,right:0,background:G.white,borderTop:`1px solid ${G.border}`,
          display:"flex",alignItems:"center",padding:"10px 0 18px",borderRadius:"0 0 40px 40px"}}>
          {NAV.map(item=>
            item.k==="__add__"?(
              <div key="add" style={{flex:1,display:"flex",justifyContent:"center"}}>
                <button onClick={()=>setScreen("add-expense")}
                  style={{width:54,height:54,background:`linear-gradient(135deg,${G.green},${G.m3})`,border:"none",
                    borderRadius:27,cursor:"pointer",fontSize:28,color:"#fff",display:"flex",alignItems:"center",
                    justifyContent:"center",boxShadow:`0 4px 18px rgba(46,157,122,0.4)`,marginTop:-22,outline:"none"}}>
                  +
                </button>
              </div>
            ):(
              <button key={item.k} onClick={()=>setScreen(item.k)}
                style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2,
                  background:"none",border:"none",cursor:"pointer",padding:"4px 0",outline:"none"}}>
                <span style={{fontSize:20}}>{item.i}</span>
                <span style={{fontSize:10,color:active===item.k?G.green:G.sub,fontWeight:active===item.k?700:400}}>
                  {item.l}
                </span>
              </button>
            )
          )}
        </div>

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
