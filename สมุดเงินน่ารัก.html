<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MoneyNest - สมุดจัดการเงินส่วนตัว</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #2E9D7A;
      --primary-medium: #66C7A0;
      --primary-light: #A7E3C2;
      --bg-pastel: #C8F0D9;
      --cream: #FFF7E6;
      --pink: #FFB4C1;
      --gray-text: #8E8E93;
      --dark-text: #2c3e50;
      --light-bg: #F4FBF8;
      --card-shadow: 0 8px 24px rgba(46, 157, 122, 0.06);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Sarabun', sans-serif; -webkit-tap-highlight-color: transparent; }
    body { background-color: #eef7f4; color: var(--dark-text); display: flex; justify-content: center; align-items: center; min-height: 100vh; }

    .phone-container {
      width: 100%; max-width: 430px; height: 880px; background-color: var(--light-bg);
      border-radius: 40px; box-shadow: 0 20px 60px rgba(0,0,0,0.12); border: 12px solid #333;
      position: relative; display: flex; flex-direction: column; overflow: hidden;
    }

    .app-header {
      background: linear-gradient(135deg, #ffffff 0%, var(--light-bg) 100%);
      padding: 18px 24px; border-bottom: 1px solid rgba(46, 157, 122, 0.1);
      display: flex; justify-content: space-between; align-items: center;
    }
    .brand-group { display: flex; align-items: center; gap: 12px; }
    .brand-logo { width: 42px; height: 42px; background-color: var(--bg-pastel); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; }
    .brand-title h1 { font-size: 18px; color: var(--primary); font-weight: 700; }
    .brand-title p { font-size: 11px; color: var(--gray-text); }

    .main-content { flex: 1; overflow-y: auto; padding: 16px; padding-bottom: 90px; }
    .main-content::-webkit-scrollbar { width: 0px; }

    .card { background: white; border-radius: 20px; padding: 18px; margin-bottom: 14px; box-shadow: var(--card-shadow); border: 1px solid rgba(46, 157, 122, 0.04); }
    .section-title { font-size: 15px; font-weight: 600; color: var(--dark-text); margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
    
    .btn-primary { background-color: var(--primary); color: white; border: none; padding: 12px; border-radius: 12px; font-size: 14px; font-weight: 600; cursor: pointer; width: 100%; text-align: center; transition: all 0.2s; }
    .btn-primary:active { transform: scale(0.98); background-color: #237a5f; }
    .btn-secondary { background-color: #edf5f1; color: var(--primary); border: none; padding: 8px 12px; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; }
    .btn-danger { background: none; border: none; color: #cc4444; font-size: 12px; cursor: pointer; padding: 2px 6px; }

    .bottom-nav { position: absolute; bottom: 0; left: 0; right: 0; height: 74px; background: white; border-top: 1px solid rgba(0,0,0,0.05); display: flex; justify-content: space-around; align-items: center; padding-bottom: 6px; z-index: 10; }
    .nav-item { display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--gray-text); font-size: 10px; cursor: pointer; gap: 4px; flex: 1; text-align: center; }
    .nav-item.active { color: var(--primary); font-weight: 600; }
    .nav-icon { font-size: 18px; }
    .nav-center-btn { width: 50px; height: 50px; background-color: var(--primary); border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; font-size: 22px; margin-top: -22px; box-shadow: 0 4px 12px rgba(46, 157, 122, 0.3); border: 4px solid white; }

    .balance-banner { background: linear-gradient(135deg, var(--primary) 0%, var(--primary-medium) 100%); color: white; text-align: center; padding: 22px; border-radius: 24px; position: relative;}
    .balance-banner p { font-size: 12px; opacity: 0.9; }
    .balance-banner h2 { font-size: 28px; font-weight: 700; margin: 4px 0 10px 0; }
    .balance-adjust-btn { position: absolute; top: 12px; right: 12px; background: rgba(255,255,255,0.2); border: none; color: white; padding: 4px 8px; border-radius: 6px; font-size: 10px; cursor: pointer; }

    .quick-menu-grid { display: flex; gap: 10px; margin-bottom: 14px; }
    .quick-box { flex: 1; padding: 12px; border-radius: 14px; text-align: center; cursor: pointer; font-size: 12px; font-weight: 500; }
    .quick-box.inc { background-color: var(--bg-pastel); color: #1e664f; }
    .quick-box.exp { background-color: var(--pink); color: #8a3c4a; }
    .quick-box.manage { background-color: var(--cream); color: #8a641e; }

    .summary-row { display: flex; justify-content: space-between; padding: 8px 0; font-size: 13px; border-bottom: 1px dashed rgba(0,0,0,0.05); }
    .summary-row:last-child { border: none; }

    .form-group { margin-bottom: 12px; }
    .form-group label { display: block; font-size: 12px; color: var(--gray-text); margin-bottom: 4px; font-weight: 500; }
    .form-control { width: 100%; padding: 10px; border: 1.5px solid #edf5f1; border-radius: 10px; font-size: 14px; outline: none; background-color: #fafdfc; }
    .form-control:focus { border-color: var(--primary-medium); }
    
    .category-select-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 4px; }
    .cat-btn { padding: 8px 4px; font-size: 11px; border: 1px solid #edf5f1; border-radius: 8px; background: #fafdfc; cursor: pointer; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .cat-btn.active { background-color: var(--bg-pastel); border-color: var(--primary); font-weight: 600; }

    .progress-bar-bg { width: 100%; height: 8px; background-color: #edf5f1; border-radius: 4px; overflow: hidden; margin: 6px 0; }
    .progress-bar-fill { height: 100%; background-color: var(--primary); width: 0%; transition: width 0.3s; }
    
    .flex-list-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #f1f8f5; font-size: 13px; }
    .flex-list-item:last-child { border: none; }

    .switch { position: relative; display: inline-block; width: 34px; height: 20px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; cursor: pointer; inset: 0; background-color: #ccc; border-radius: 20px; transition: .2s; }
    .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: white; border-radius: 50%; transition: .2s; }
    input:checked + .slider { background-color: var(--primary); }
    input:checked + .slider:before { transform: translateX(14px); }
  </style>
</head>
<body>

  <div class="phone-container">
    <div class="app-header">
      <div class="brand-group">
        <div class="brand-logo">🌿</div>
        <div class="brand-title">
          <h1>MoneyNest</h1>
          <p>จัดการเงินระบบส่วนตัวแบบกำหนดเอง</p>
        </div>
      </div>
    </div>

    <div class="main-content" id="app-view"></div>

    <div class="bottom-nav">
      <div class="nav-item active" onclick="navigate('home')" id="nav-home">
        <span class="nav-icon">🏠</span>
        <span>หน้าหลัก</span>
      </div>
      <div class="nav-item" onclick="navigate('report')" id="nav-report">
        <span class="nav-icon">📊</span>
        <span>รายงาน</span>
      </div>
      <div class="nav-item" onclick="navigate('add')">
        <div class="nav-center-btn">＋</div>
      </div>
      <div class="nav-item" onclick="navigate('goals')" id="nav-goals">
        <span class="nav-icon">🎯</span>
        <span>เป้าหมาย</span>
      </div>
      <div class="nav-item" onclick="navigate('manage')" id="nav-manage">
        <span class="nav-icon">⚙️</span>
        <span>จัดการอื่น ๆ</span>
      </div>
    </div>
  </div>

  <script>
    const CLEAN_STATE = {
      baseBalance: 0.00,
      transactions: [],
      bills: [],
      debts: [],
      recurring: [],
      goals: []
    };

    let db = JSON.parse(localStorage.getItem('moneynest_custom_db')) || CLEAN_STATE;

    function saveDB() {
      localStorage.setItem('moneynest_custom_db', JSON.stringify(db));
    }

    function calculateNetBalance() {
      let incomeSum = db.transactions.filter(t => t.type === 'income').reduce((s, t) => s + t.amount, 0);
      let expenseSum = db.transactions.filter(t => t.type === 'expense').reduce((s, t) => s + t.amount, 0);
      return db.baseBalance + incomeSum - expenseSum;
    }

    function getMonthStats() {
      let income = db.transactions.filter(t => t.type === 'income').reduce((s, t) => s + t.amount, 0);
      let expense = db.transactions.filter(t => t.type === 'expense').reduce((s, t) => s + t.amount, 0);
      return { income, expense };
    }

    function fmt(num) {
      return Number(num).toLocaleString('th-TH', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    let currentTab = 'home';
    let addType = 'expense';
    let selectedCat = 'อาหาร';

    function navigate(tabName) {
      currentTab = tabName;
      document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
      const activeNav = document.getElementById(`nav-${tabName}`);
      if (activeNav) activeNav.classList.add('active');

      const view = document.getElementById('app-view');
      view.innerHTML = '';

      switch(tabName) {
        case 'home': renderHome(view); break;
        case 'report': renderReport(view); break;
        case 'add': renderAddTransaction(view); break;
        case 'goals': renderGoals(view); break;
        case 'manage': renderManageMenu(view); break;
        case 'bills': renderBillsView(view); break;
        case 'debts': renderDebtsView(view); break;
        case 'recurring': renderRecurringView(view); break;
      }
      view.scrollTop = 0;
    }

    function renderHome(view) {
      let netBalance = calculateNetBalance();
      let stats = getMonthStats();

      view.innerHTML = `
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:14px;">
          <div>
            <h2 style="font-size:15px; font-weight:600;">สวัสดีผู้ใช้งาน 😊</h2>
            <p style="font-size:12px; color:var(--gray-text);">บันทึกเงินง่าย ๆ ได้ด้วยตัวเองวันนี้</p>
          </div>
          <span style="font-size:24px;">📝</span>
        </div>

        <div class="card balance-banner">
          <button class="balance-adjust-btn" onclick="adjustBaseBalance()">⚙️ ปรับทุนเริ่มต้น</button>
          <p>เงินคงเหลือสุทธิปัจจุบัน</p>
          <h2>฿ ${fmt(netBalance)}</h2>
          <div style="display:flex; justify-content:space-between; margin-top:10px; border-top:1px solid rgba(255,255,255,0.2); padding-top:10px; font-size:12px;">
            <div style="flex:1; border-right:1px solid rgba(255,255,255,0.2)">รายรับรวม: <strong>฿${fmt(stats.income)}</strong></div>
            <div style="flex:1;">รายจ่ายรวม: <strong>฿${fmt(stats.expense)}</strong></div>
          </div>
        </div>

        <div class="quick-menu-grid">
          <div class="quick-box inc" onclick="addType='income'; selectedCat='เงินเดือน'; navigate('add');">💰 + รายรับ</div>
          <div class="quick-box exp" onclick="addType='expense'; selectedCat='อาหาร'; navigate('add');">💸 + รายจ่าย</div>
          <div class="quick-box manage" onclick="navigate('goals');">🎯 เป้าหมาย</div>
        </div>

        <div class="card">
          <div class="section-title">📊 ภาพรวมบัญชีปัจจุบันของคุณ</div>
          <div class="summary-row"><span class="label" style="color:var(--primary)">🟢 รายรับสะสมทั้งหมด</span><strong>฿ ${fmt(stats.income)}</strong></div>
          <div class="summary-row"><span class="label" style="color:#e74c3c">🔴 รายจ่ายสะสมทั้งหมด</span><strong>฿ ${fmt(stats.expense)}</strong></div>
          <div class="summary-row" style="margin-top:4px; padding-top:8px; border-top:1px solid #edf5f1;"><span class="label">💼 ทุนเริ่มต้นในกระเป๋า</span><strong>฿ ${fmt(db.baseBalance)}</strong></div>
        </div>

        <div class="card">
          <div class="section-title">📝 รายการล่าสุด (5 รายการล่าสุด)</div>
          ${db.transactions.length === 0 ? '<p style="text-align:center; font-size:12px; color:var(--gray-text); padding:10px;">ยังไม่มีการบันทึกรายการ</p>' : ''}
          ${db.transactions.slice(0, 5).map(t => `
            <div class="flex-list-item">
              <div>
                <span style="font-weight:500;">${t.category}</span> ${t.note ? `<span style="font-size:11px; color:var(--gray-text);">(${t.note})</span>` : ''}
                <div style="font-size:10px; color:var(--gray-text);">${t.date}</div>
              </div>
              <div style="display:flex; align-items:center; gap:8px;">
                <span style="font-weight:600; color:${t.type === 'income' ? 'var(--primary)' : '#e74c3c'}">
                  ${t.type === 'income' ? '+' : '-'}฿${fmt(t.amount)}
                </span>
                <button class="btn-danger" onclick="deleteTransaction(${t.id})">✕</button>
              </div>
            </div>
          `).join('')}
        </div>
      `;
    }

    function adjustBaseBalance() {
      let val = prompt("กำหนดจำนวนเงินทุนตั้งต้นในกระเป๋าปัจจุบันของคุณ (บาท):", db.baseBalance);
      if (val !== null) {
        let num = parseFloat(val);
        if (!isNaN(num)) {
          db.baseBalance = num;
          saveDB();
          navigate('home');
        } else { alert("กรุณากรอกตัวเลขที่ถูกต้องครับ"); }
      }
    }

    function deleteTransaction(id) {
      if(confirm("ต้องการลบรายการบัญชีนี้ใช่ไหม?")) {
        db.transactions = db.transactions.filter(t => t.id !== id);
        saveDB(); navigate('home');
      }
    }

    function renderReport(view) {
      let stats = getMonthStats();
      let catSums = {};
      db.transactions.filter(t => t.type === 'expense').forEach(t => {
        catSums[t.category] = (catSums[t.category] || 0) + t.amount;
      });

      view.innerHTML = `
        <div class="card" style="text-align:center;">
          <div class="section-title" style="justify-content:center;">📊 สัดส่วนโครงสร้างการใช้จ่าย</div>
          <div style="display:flex; justify-content:space-around; font-size:13px; margin-top:8px;">
            <div>รายรับสะสม<br><strong style="color:var(--primary); font-size:16px;">฿${fmt(stats.income)}</strong></div>
            <div style="border-right:1px solid #ddd;"></div>
            <div>รายจ่ายสะสม<br><strong style="color:#e74c3c; font-size:16px;">฿${fmt(stats.expense)}</strong></div>
          </div>
        </div>

        <div class="card">
          <div class="section-title">🍕 รายจ่ายแยกตามหมวดหมู่วัตถุประสงค์</div>
          ${Object.keys(catSums).length === 0 ? '<p style="text-align:center; font-size:12px; color:var(--gray-text); padding:10px;">ยังไม่มีข้อมูลรายจ่ายเพื่อนำมาวิเคราะห์</p>' : ''}
          ${Object.entries(catSums).map(([cat, amt]) => {
            let pct = stats.expense > 0 ? Math.round((amt / stats.expense) * 100) : 0;
            return `
              <div style="margin-bottom:12px; font-size:13px;">
                <div style="display:flex; justify-content:space-between; margin-bottom:4px;">
                  <span>📁 ${cat}</span>
                  <strong>฿${fmt(amt)} (${pct}%)</strong>
                </div>
                <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${pct}%; background-color:var(--primary-medium);"></div></div>
              </div>
            `;
          }).join('')}
        </div>
      `;
    }

    function renderAddTransaction(view) {
      const cats = addType === 'expense' 
        ? ['อาหาร', 'เดินทาง', 'บ้าน', 'ผ่อนชำระ', 'ช้อปปิ้ง', 'สุขภาพ', 'บันเทิง', 'อื่นๆ']
        : ['เงินเดือน', 'ฟรีแลนซ์', 'ลงทุน', 'ขายของ', 'อื่นๆ'];

      view.innerHTML = `
        <div class="card">
          <div style="display:flex; background-color:#edf5f1; padding:4px; border-radius:10px; margin-bottom:14px;">
            <button style="flex:1; padding:8px; border:none; background:${addType==='expense'?'white':'none'}; color:${addType==='expense'?'var(--primary)':'var(--gray-text)'}; font-weight:600; border-radius:8px; cursor:pointer;" onclick="addType='expense'; selectedCat='อาหาร'; navigate('add');">💸 บันทึกรายจ่าย</button>
            <button style="flex:1; padding:8px; border:none; background:${addType==='income'?'white':'none'}; color:${addType==='income'?'var(--primary)':'var(--gray-text)'}; font-weight:600; border-radius:8px; cursor:pointer;" onclick="addType='income'; selectedCat='เงินเดือน'; navigate('add');">💰 บันทึกรายรับ</button>
          </div>

          <div class="form-group">
            <label>จำนวนเงิน (บาท)</label>
            <input type="number" id="inp-amount" class="form-control" placeholder="0.00" required>
          </div>

          <div class="form-group">
            <label>เลือกหมวดหมู่รายการ</label>
            <div class="category-select-grid">
              ${cats.map(c => `<div class="cat-btn ${selectedCat===c?'active':''}" onclick="selectedCat='${c}'; navigate('add');"><span>📂</span><span>${c}</span></div>`).join('')}
            </div>
          </div>

          <div class="form-group">
            <label>โน้ตรายละเอียดเพิ่มเติม</label>
            <input type="text" id="inp-note" class="form-control" placeholder="เช่น ค่าข้าวเที่ยง, โบนัสพิเศษ...">
          </div>

          <div class="form-group">
            <label>วันที่ทำรายการ</label>
            <input type="date" id="inp-date" class="form-control" value="${new Date().toISOString().split('T')[0]}">
          </div>

          <button class="btn-primary" onclick="saveTransaction()" style="margin-top:10px;">💾 บันทึกรายการลงระบบ</button>
        </div>
      `;
    }

    function saveTransaction() {
      let amt = parseFloat(document.getElementById('inp-amount').value);
      let note = document.getElementById('inp-note').value.trim();
      let date = document.getElementById('inp-date').value;

      if(!amt || amt <= 0) { alert("กรุณาใส่จำนวนเงินให้ถูกต้องก่อนกดบันทึกครับ"); return; }

      db.transactions.unshift({ id: Date.now(), type: addType, amount: amt, category: selectedCat, note, date });
      saveDB();
      alert("บันทึกข้อมูลเรียบร้อยแล้ว!");
      navigate('home');
    }

    function renderGoals(view) {
      view.innerHTML = `
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
          <div class="section-title" style="margin:0;">🎯 จัดการเป้าหมายการออมเงิน</div>
          <button class="btn-secondary" onclick="addNewGoalPrompt()">＋ สร้างเป้าหมายใหม่</button>
        </div>

        ${db.goals.length === 0 ? `
          <div class="card" style="text-align:center; padding:30px 10px; color:var(--gray-text);">
            <span style="font-size:30px; display:block; margin-bottom:8px;">🎯</span>
            ยังไม่มีเป้าหมายการออมเงินในขณะนี้<br>กดปุ่มด้านบนเพื่อกำหนดเป้าหมายของคุณเองได้เลย!
          </div>
        ` : ''}

        ${db.goals.map(g => {
          let pct = g.target > 0 ? Math.min(100, Math.round((g.saved / g.target) * 100)) : 0;
          return `
            <div class="card">
              <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:4px;">
                <div>
                  <h4 style="font-size:14px; font-weight:600;">${g.icon || '🎯'} ${g.name}</h4>
                  <p style="font-size:11px; color:var(--gray-text);">ความคืบหน้าภาพรวม</p>
                </div>
                <div style="text-align:right;">
                  <span style="font-size:14px; font-weight:700; color:var(--primary);">${pct}%</span>
                  <button class="btn-danger" onclick="deleteGoal(${g.id})" style="display:block; margin-left:auto; margin-top:2px;">ลบ</button>
                </div>
              </div>

              <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${pct}%;"></div></div>
              
              <div style="display:flex; justify-content:space-between; font-size:11px; color:var(--gray-text); margin-top:4px;">
                <span>เก็บเงินแล้ว: ฿${fmt(g.saved)}</span>
                <span>เป้าหมายทั้งหมด: ฿${fmt(g.target)}</span>
              </div>

              <div style="display:flex; gap:8px; margin-top:12px; border-top:1px solid #f1f8f5; padding-top:8px;">
                <button style="flex:1; padding:6px; font-size:11px; background:#eaf7f2; color:var(--primary); border:none; border-radius:6px; cursor:pointer; font-weight:500;" onclick="updateGoalAmount(${g.id}, 'add')">➕ สมทบเงินเพิ่ม</button>
                <button style="flex:1; padding:6px; font-size:11px; background:#fff1f0; color:#e74c3c; border:none; border-radius:6px; cursor:pointer; font-weight:500;" onclick="updateGoalAmount(${g.id}, 'edit')">✏️ แก้ไขยอดสุทธิ</button>
              </div>
            </div>
          `;
        }).join('')}
      `;
    }

    function addNewGoalPrompt() {
      let name = prompt("พิมพ์ชื่อเป้าหมายใหม่ที่คุณต้องการตั้ง (เช่น ซื้อรถ, ไปเที่ยว, เงินสำรอง):");
      if(!name) return;
      let targetVal = prompt("ระบุจำนวนวงเงินเป้าหมายสูงสุดที่ต้องการเก็บ (บาท):");
      let target = parseFloat(targetVal);
      if(isNaN(target) || target <= 0) { alert("จำนวนเงินเป้าหมายไม่ถูกต้อง"); return; }
      
      let savedVal = prompt("ระบุเงินออมสะสมตั้งต้นที่มีอยู่แล้ว (ถ้าไม่มีใส่ 0):", "0");
      let saved = parseFloat(savedVal) || 0;
      let icon = prompt("ใส่อิโมจิสัญลักษณ์ประจำเป้าหมายนี้ (เช่น 🚗, 💻, ✈️, 🏡):", "🎯");

      db.goals.push({ id: Date.now(), name, target, saved, icon: icon || '🎯' });
      saveDB(); navigate('goals');
    }

    function updateGoalAmount(id, mode) {
      let goal = db.goals.find(g => g.id === id);
      if(!goal) return;

      if(mode === 'add') {
        let val = prompt(`ระบุเงินที่จะสมทบเพิ่มเข้าในเป้าหมาย "${goal.name}" (บาท):`);
        let amt = parseFloat(val);
        if(amt && amt > 0) { goal.saved += amt; saveDB(); navigate('goals'); }
      } else if(mode === 'edit') {
        let val = prompt(`แก้ไขยอดออมปัจจุบันของ "${goal.name}" เป็นยอดสุทธิเท่าไหร่ (บาท):`, goal.saved);
        let amt = parseFloat(val);
        if(!isNaN(amt) && amt >= 0) { goal.saved = amt; saveDB(); navigate('goals'); }
      }
    }

    // ฟังก์ชันลบเป้าหมายการออมเงิน
    function deleteGoal(id) {
      if(confirm("ยืนยันที่จะลบเป้าหมายการเก็บเงินนี้ใช่ไหม?")) {
        db.goals = db.goals.filter(g => g.id !== id);
        saveDB(); navigate('goals');
      }
    }

    function renderManageMenu(view) {
      view.innerHTML = `
        <div class="card" style="padding:10px;">
          <div class="flex-list-item" onclick="navigate('bills')" style="padding:14px; cursor:pointer;">
            <span>📅 จัดการบิลค้างชำระ</span><span>▶</span>
          </div>
          <div class="flex-list-item" onclick="navigate('debts')" style="padding:14px; cursor:pointer;">
            <span>🤝 ระบบบริหารบัญชีหนี้สิน</span><span>▶</span>
          </div>
          <div class="flex-list-item" onclick="navigate('recurring')" style="padding:14px; cursor:pointer;">
            <span>🔁 ตั้งรอบค่าใช้จ่ายประจำเดือน</span><span>▶</span>
          </div>
        </div>
        <div class="card" style="padding:14px; text-align:center;">
          <button style="background:none; border:none; color:#e74c3c; font-weight:600; font-size:13px; cursor:pointer;" onclick="clearAllData()">🔄 ล้างข้อมูลทั้งหมดในเครื่องเพื่อเริ่มต้นใหม่</button>
        </div>
      `;
    }

    function renderBillsView(view) {
      view.innerHTML = `
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
          <span class="section-title" style="margin:0;">📅 รายการบิลที่ต้องชำระ</span>
          <button class="btn-secondary" onclick="addBillPrompt()">＋ เพิ่มบิลใหม่</button>
        </div>
        <div class="card">
          ${db.bills.length === 0 ? '<p style="text-align:center; font-size:12px; color:var(--gray-text); padding:10px;">ไม่มีรายการบิล</p>' : ''}
          ${db.bills.map(b => `
            <div class="flex-list-item">
              <div>
                <strong style="display:block;">${b.name}</strong>
                <span style="font-size:11px; color:${b.status==='paid'?'var(--primary)':'#e74c3c'}; font-weight:600;">
                  ${b.status==='paid'?'✅ จ่ายแล้ว':'❌ ยังไม่ได้จ่าย'}
                </span>
              </div>
              <div style="text-align:right; display:flex; align-items:center; gap:8px;">
                <span style="font-weight:600; margin-right:4px;">฿${fmt(b.amount)}</span>
                ${b.status==='unpaid'?`<button class="btn-secondary" style="padding:4px 8px; font-size:11px;" onclick="payBill(${b.id})">กดจ่าย</button>`:''}
                <button class="btn-danger" onclick="deleteBill(${b.id})">✕</button>
              </div>
            </div>
          `).join('')}
        </div>
        <button class="btn-secondary" style="width:100%;" onclick="navigate('manage')">◀ ย้อนกลับ</button>
      `;
    }

    function addBillPrompt() {
      let name = prompt("ระบุชื่อรายการบิล:");
      let amt = parseFloat(prompt("จำนวนยอดเงินที่ต้องชำระ (บาท):"));
      if(name && amt) {
        db.bills.push({ id: Date.now(), name, amount: amt, status: 'unpaid' });
        saveDB(); navigate('bills');
      }
    }

    function payBill(id) {
      let bill = db.bills.find(b => b.id === id);
      if(bill) {
        bill.status = 'paid';
        db.transactions.unshift({ id: Date.now(), type: 'expense', amount: bill.amount, category: 'ผ่อนชำระ', note: `จ่ายบิล: ${bill.name}`, date: new Date().toISOString().split('T')[0] });
        saveDB(); navigate('bills');
      }
    }

    function deleteBill(id) {
      db.bills = db.bills.filter(b => b.id !== id); saveDB(); navigate('bills');
    }

    function renderDebtsView(view) {
      view.innerHTML = `
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
          <span class="section-title" style="margin:0;">🤝 บัญชีหนี้สินคงค้าง</span>
          <button class="btn-secondary" onclick="addDebtPrompt()">＋ เพิ่มยอดกู้ยืม</button>
        </div>
        ${db.debts.length === 0 ? '<div class="card" style="text-align:center; font-size:12px; color:var(--gray-text); padding:20px;">ไม่มีภาระหนี้สิน</div>' : ''}
        ${db.debts.map(d => `
          <div class="card">
            <div style="display:flex; justify-content:space-between; font-size:14px; font-weight:600; margin-bottom:6px;">
              <span>เจ้าหนี้: ${d.lender}</span>
              <span style="color:#e74c3c;">คงเหลือ ฿${fmt(d.amount - d.paid)}</span>
            </div>
            <div style="font-size:11px; color:var(--gray-text);">ยอดเต็ม: ฿${fmt(d.amount)} | คืนแล้ว: ฿${fmt(d.paid)}</div>
            <div style="display:flex; gap:8px; margin-top:8px; border-top:1px solid #edf5f1; padding-top:8px;">
              <button style="flex:1; padding:4px; font-size:11px; background:#edf5f1; border:none; border-radius:4px; cursor:pointer;" onclick="payDebtPrompt(${d.id})">💸 บันทึกการคืนเงิน</button>
              <button class="btn-danger" onclick="deleteDebt(${d.id})">✕ ลบหนี้</button>
            </div>
          </div>
        `).join('')}
        <button class="btn-secondary" style="width:100%;" onclick="navigate('manage')">◀ ย้อนกลับ</button>
      `;
    }

    function addDebtPrompt() {
      let lender = prompt("กู้ยืมมาจากใคร:");
      let amount = parseFloat(prompt("ยอดเงินกู้ยืมทั้งหมด (บาท):"));
      if(lender && amount) {
        db.debts.push({ id: Date.now(), lender, amount, paid: 0 });
        saveDB(); navigate('debts');
      }
    }

    function payDebtPrompt(id) {
      let debt = db.debts.find(d => d.id === id);
      if(debt) {
        let pay = parseFloat(prompt(`ระบุเงินที่จะจ่ายคืนให้คุณ "${debt.lender}" (บาท):`));
        if(pay && pay > 0) {
          debt.paid += pay;
          db.transactions.unshift({ id: Date.now(), type: 'expense', amount: pay, category: 'ผ่อนชำระ', note: `ผ่อนหนี้ให้ ${debt.lender}`, date: new Date().toISOString().split('T')[0] });
          saveDB(); navigate('debts');
        }
      }
    }

    function deleteDebt(id) {
      if(confirm("ต้องการลบประวัติหนี้สินก้อนนี้ออกใช่ไหม?")) {
        db.debts = db.debts.filter(d => d.id !== id); saveDB(); navigate('debts');
      }
    }

    function renderRecurringView(view) {
      view.innerHTML = `
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
          <span class="section-title" style="margin:0;">🔁 รายการจ่ายประจำรายเดือน</span>
          <button class="btn-secondary" onclick="addRecurringPrompt()">＋ เพิ่มรายการประจำ</button>
        </div>
        <div class="card">
          ${db.recurring.length === 0 ? '<p style="text-align:center; font-size:12px; color:var(--gray-text); padding:10px;">ยังไม่มีรายจ่ายประจำ</p>' : ''}
          ${db.recurring.map(r => `
            <div class="flex-list-item">
              <div>
                <strong>${r.name}</strong>
                <div style="font-size:11px; color:var(--primary); font-weight:500;">฿${fmt(r.amount)} / เดือน</div>
              </div>
              <div style="display:flex; align-items:center; gap:12px;">
                <label class="switch">
                  <input type="checkbox" ${r.active ? 'checked' : ''} onchange="toggleRecurring(${r.id})">
                  <span class="slider"></span>
                </label>
                <button class="btn-danger" onclick="deleteRecurring(${r.id})">✕</button>
              </div>
            </div>
          `).join('')}
        </div>
        <button class="btn-secondary" style="width:100%;" onclick="navigate('manage')">◀ ย้อนกลับ</button>
      `;
    }

    function addRecurringPrompt() {
      let name = prompt("ระบุชื่อบริการที่จ่ายประจำ (เช่น Netflix, Spotify):");
      let amount = parseFloat(prompt("จำนวนเงินต่อเดือน (บาท):"));
      if(name && amount) {
        db.recurring.push({ id: Date.now(), name, amount, active: true });
        saveDB(); navigate('recurring');
      }
    }

    function toggleRecurring(id) {
      let item = db.recurring.find(r => r.id === id);
      if(item) { item.active = !item.active; saveDB(); }
    }

    function deleteRecurring(id) {
      db.recurring = db.recurring.filter(r => r.id !== id); saveDB(); navigate('recurring');
    }

    function clearAllData() {
      if(confirm("คุณต้องการล้างข้อมูลบัญชีทั้งหมดใช่หรือไม่?")) {
        localStorage.removeItem('moneynest_custom_db');
        db = JSON.parse(JSON.stringify(CLEAN_STATE));
        saveDB(); navigate('home');
      }
    }

    navigate('home');
  </script>
</body>
</html>
