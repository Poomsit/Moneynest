<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MoneyNest - จัดการเงินให้ง่าย ชีวิตสบายกว่าเดิม</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #2E9D7A;
      --primary-medium: #66C7A0;
      --primary-light: #A7E3C2;
      --bg-pastel: #C8F0D9;
      --cream: #FFF7E6;
      --pink: #FFB4C1;
      --gray-text: #8E8E93;
      --dark-text: #2c3e50;
      --light-bg: #F4FBF8;
      --card-shadow: 0 8px 24px rgba(46, 157, 122, 0.06);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Sarabun', sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background-color: #eef7f4;
      color: var(--dark-text);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    /* จำลองขนาดหน้าจอมือถือบน Desktop */
    .phone-container {
      width: 100%;
      max-width: 430px;
      height: 900px;
      background-color: var(--light-bg);
      border-radius: 40px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.12);
      border: 12px solid #333;
      position: relative;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ส่วนหัวของแอป */
    .app-header {
      background: linear-gradient(135deg, #ffffff 0%, var(--light-bg) 100%);
      padding: 20px 24px;
      border-bottom: 1px solid rgba(46, 157, 122, 0.1);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand-logo {
      width: 45px;
      height: 45px;
      background-color: var(--bg-pastel);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }

    .brand-title h1 {
      font-size: 20px;
      color: var(--primary);
      font-weight: 700;
    }

    .brand-title p {
      font-size: 11px;
      color: var(--gray-text);
    }

    /* ส่วนเนื้อหาหลักที่เลื่อนได้ */
    .main-content {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      padding-bottom: 100px;
    }

    .main-content::-webkit-scrollbar {
      width: 0px;
    }

    /* การ์ดและคอมโพเนนต์ร่วม */
    .card {
      background: white;
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: var(--card-shadow);
      border: 1px solid rgba(46, 157, 122, 0.04);
    }

    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }

    .section-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--dark-text);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .btn-primary {
      background-color: var(--primary);
      color: white;
      border: none;
      padding: 14px;
      border-radius: 16px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      transition: all 0.2s;
      text-align: center;
    }

    .btn-primary:active {
      transform: scale(0.98);
      background-color: #237a5f;
    }

    /* แถบเมนูด้านล่าง (Bottom Navigation) */
    .bottom-nav {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 74px;
      background: white;
      border-top: 1px solid rgba(0,0,0,0.05);
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding-bottom: 8px;
      z-index: 10;
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--gray-text);
      font-size: 10px;
      cursor: pointer;
      gap: 4px;
      flex: 1;
    }

    .nav-item.active {
      color: var(--primary);
      font-weight: 600;
    }

    .nav-icon {
      font-size: 20px;
    }

    .nav-center-btn {
      width: 52px;
      height: 52px;
      background-color: var(--primary);
      border-radius: 50%;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      margin-top: -24px;
      box-shadow: 0 4px 14px rgba(46, 157, 122, 0.4);
      border: 4px solid white;
    }

    /* หน้าหลัก (Home View) */
    .greeting-box {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }
    .greeting-text h2 { font-size: 15px; font-weight: 600; }
    .greeting-text p { font-size: 12px; color: var(--gray-text); }
    
    .balance-banner {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-medium) 100%);
      color: white;
      text-align: center;
      padding: 24px;
    }
    .balance-banner p { font-size: 13px; opacity: 0.9; }
    .balance-banner h2 { font-size: 32px; font-weight: 700; margin: 4px 0 14px 0; }
    
    .sub-stats {
      display: flex;
      justify-content: space-between;
      border-top: 1px solid rgba(255,255,255,0.2);
      padding-top: 12px;
    }
    .sub-stat-item { text-align: center; flex: 1; }
    .sub-stat-item:first-child { border-right: 1px solid rgba(255,255,255,0.2); }
    .sub-stat-item span { font-size: 11px; opacity: 0.8; display: block; }
    .sub-stat-item strong { font-size: 14px; }

    .quick-menu-grid {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
    }
    .quick-box {
      flex: 1;
      padding: 14px;
      border-radius: 16px;
      text-align: center;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
    }
    .quick-box.inc { background-color: var(--bg-pastel); color: #1e664f; }
    .quick-box.exp { background-color: var(--pink); color: #8a3c4a; }
    .quick-box.bill { background-color: var(--cream); color: #8a641e; }

    .summary-row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      font-size: 14px;
      border-bottom: 1px dashed rgba(0,0,0,0.05);
    }
    .summary-row:last-child { border: none; }
    .summary-row .label { color: var(--gray-text); }
    .summary-row .val-inc { color: var(--primary); font-weight: 600; }
    .summary-row .val-exp { color: #e74c3c; font-weight: 600; }
    .summary-row .val-bal { color: var(--dark-text); font-weight: 700; }

    /* หน้าบันทึกรายจ่าย/รับ (Add Transaction View) */
    .tab-toggle-container {
      display: flex;
      background-color: #edf5f1;
      padding: 4px;
      border-radius: 12px;
      margin-bottom: 16px;
    }
    .tab-toggle-btn {
      flex: 1;
      padding: 10px;
      border: none;
      background: none;
      font-size: 13px;
      font-weight: 600;
      border-radius: 10px;
      cursor: pointer;
      color: var(--gray-text);
    }
    .tab-toggle-btn.active {
      background: white;
      color: var(--primary);
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }

    .form-group {
      margin-bottom: 14px;
    }
    .form-group label {
      display: block;
      font-size: 12px;
      color: var(--gray-text);
      margin-bottom: 6px;
      font-weight: 500;
    }
    .form-control {
      width: 100%;
      padding: 12px;
      border: 1.5px solid #edf5f1;
      border-radius: 12px;
      font-size: 15px;
      outline: none;
      background-color: #fafdfc;
    }
    .form-control:focus {
      border-color: var(--primary-medium);
    }

    .category-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 16px;
    }
    .cat-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 10px 4px;
      border-radius: 12px;
      background-color: #fafdfc;
      border: 1.5px solid #edf5f1;
      cursor: pointer;
      font-size: 11px;
      gap: 4px;
    }
    .cat-item.active {
      background-color: var(--bg-pastel);
      border-color: var(--primary);
      font-weight: 600;
    }
    .cat-icon { font-size: 18px; }

    /* หน้าบิลวันนี้ (Bills View) */
    .bill-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid #f1f8f5;
    }
    .bill-info h4 { font-size: 14px; font-weight: 500; }
    .bill-info span { font-size: 11px; color: var(--gray-text); }
    .bill-status {
      text-align: right;
    }
    .bill-amt { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
    .status-badge {
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 6px;
      font-weight: 500;
    }
    .status-badge.unpaid { background-color: #fceceb; color: #e74c3c; cursor: pointer; }
    .status-badge.paid { background-color: #eaf7f2; color: var(--primary); }

    /* หน้าหนี้สิน (Debts View) */
    .debt-profile {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }
    .debt-avatar {
      width: 40px; height: 40px; border-radius: 50%; background-color: var(--pink);
      display: flex; align-items: center; justify-content: center; font-size: 20px;
    }
    .progress-wrapper {
      margin: 12px 0;
    }
    .progress-text {
      display: flex; justify-content: space-between; font-size: 12px; color: var(--gray-text); margin-top: 4px;
    }
    .progress-bar-bg {
      width: 100%; height: 8px; background-color: #edf5f1; border-radius: 4px; overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%; background-color: var(--primary); width: 0%; transition: width 0.3s;
    }
    .history-list {
      margin-top: 10px; font-size: 12px;
    }
    .history-item {
      display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px dashed #edf5f1;
    }

    /* หน้ารายงาน (Reports View) */
    .report-tabs { display: flex; gap: 8px; margin-bottom: 14px; }
    .report-tab-btn {
      flex: 1; padding: 6px; font-size: 12px; border: 1px solid var(--primary-light);
      background: white; border-radius: 8px; cursor: pointer;
    }
    .report-tab-btn.active { background-color: var(--primary); color: white; }
    
    .chart-mockup {
      height: 120px; display: flex; align-items: flex-end; justify-content: space-between; padding-top: 10px;
      border-bottom: 2px solid var(--primary-light); margin-bottom: 16px;
    }
    .chart-bar-wrapper { display: flex; flex-direction: column; align-items: center; flex: 1; gap: 4px;}
    .chart-bar { width: 16px; background-color: var(--primary-medium); border-radius: 4px 4px 0 0; min-height: 5px; transition: height 0.3s;}
    .chart-bar.exp { background-color: var(--pink); }
    .chart-label { font-size: 10px; color: var(--gray-text); }

    .cat-report-row {
      display: flex; align-items: center; gap: 10px; margin-bottom: 10px; font-size: 13px;
    }
    .cat-report-name { width: 70px; }
    .cat-report-bar-bg { flex: 1; height: 10px; background-color: #edf5f1; border-radius: 5px; overflow: hidden; }
    .cat-report-bar-fill { height: 100%; background-color: var(--primary-medium); }
    .cat-report-amt { width: 65px; text-align: right; font-weight: 500; }

    /* หน้าเป้าหมาย (Goals View) */
    .goal-card {
      border-left: 4px solid var(--primary);
    }
    .goal-card.g2 { border-left-color: #f39c12; }
    .goal-card.g3 { border-left-color: #9b59b6; }
    
    /* หน้ารายจ่ายประจำ (Recurring View) */
    .switch-container {
      position: relative; display: inline-block; width: 40px; height: 22px;
    }
    .switch-container input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute; cursor: pointer; inset: 0; background-color: #ccc; border-radius: 22px; transition: .2s;
    }
    .slider:before {
      position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background-color: white; border-radius: 50%; transition: .2s;
    }
    input:checked + .slider { background-color: var(--primary); }
    input:checked + .slider:before { transform: translateX(18px); }

    /* หน้าตั้งค่า (Settings View) */
    .setting-item {
      display: flex; justify-content: space-between; align-items: center; padding: 14px 0;
      border-bottom: 1px solid #f1f8f5; cursor: pointer; font-size: 14px;
    }
    .setting-item:last-child { border: none; }
    .setting-item span { display: flex; align-items: center; gap: 10px; }
    .arrow-r { color: var(--gray-text); font-size: 12px; }

    .hidden { display: none !important; }
  </style>
</head>
<body>

  <div class="phone-container">
    
    <div class="app-header">
      <div class="brand-logo">🦜</div>
      <div class="brand-title">
        <h1>MoneyNest</h1>
        <p>จัดการเงินให้ง่าย ชีวิตสบายกว่าเดิม ♡</p>
      </div>
    </div>

    <div class="main-content" id="view-container">
      </div>

    <div class="bottom-nav">
      <div class="nav-item active" onclick="switchView('home')" id="nav-home">
        <span class="nav-icon">🏠</span>
        <span>หน้าหลัก</span>
      </div>
      <div class="nav-item" onclick="switchView('report')" id="nav-report">
        <span class="nav-icon">📊</span>
        <span>รายงาน</span>
      </div>
      <div class="nav-item" onclick="switchView('add')" id="nav-add">
        <div class="nav-center-btn">＋</div>
      </div>
      <div class="nav-item" onclick="switchView('features')" id="nav-features">
        <span class="nav-icon">💡</span>
        <span>ฟีเจอร์</span>
      </div>
      <div class="nav-item" onclick="switchView('settings')" id="nav-settings">
        <span class="nav-icon">⚙️</span>
        <span>ตั้งค่า</span>
      </div>
    </div>

  </div>

  <script>
    /* ================= INITIAL SYSTEM STATE (ตามตัวเลขจริงในรูปภาพ) ================= */
    const DEFAULT_STATE = {
      balance: 58420.00,
      totalIncome: 120000.00,
      totalExpense: 61580.00,
      transactions: [
        { id: 1, type: 'expense', amount: 800.00, category: 'อาหาร', date: '2026-05-18', note: 'มื้อกลางวันอาหารญี่ปุ่น' },
        { id: 2, type: 'expense', amount: 120.00, category: 'เดินทาง', date: '2026-05-18', note: 'รถไฟฟ้า' }
      ],
      bills: [
        { id: 1, name: 'ค่าเช่า', amount: 8000.00, status: 'unpaid', date: '18 พฤษภาคม 2569' },
        { id: 2, name: 'ค่าโทรศัพท์', amount: 890.00, status: 'paid', date: '18 พฤษภาคม 2569' },
        { id: 3, name: 'Netflix', amount: 419.00, status: 'unpaid', date: '18 พฤษภาคม 2569' }
      ],
      debt: {
        lender: 'ยืมเงินแม่',
        date: '1 ม.ค. 2569',
        total: 100000.00,
        paid: 40000.00,
        remaining: 60000.00,
        history: [
          { period: 'งวดที่ 4', date: '1 พ.ค. 2569', amount: 10000.00 },
          { period: 'งวดที่ 3', date: '1 เม.ย. 2569', amount: 10000.00 },
          { period: 'งวดที่ 2', date: '1 มี.ค. 2569', amount: 10000.00 },
          { period: 'งวดที่ 1', date: '1 ก.พ. 2569', amount: 10000.00 }
        ]
      },
      recurring: [
        { id: 1, name: 'ค่าเช่า', amount: 8000.00, schedule: 'ทุกวันที่ 1 ของเดือน', active: true },
        { id: 2, name: 'Netflix', amount: 419.00, schedule: 'ทุกวันที่ 15 ของเดือน', active: true },
        { id: 3, name: 'ค่าโทรศัพท์', amount: 890.00, schedule: 'ทุกวันที่ 20 ของเดือน', active: true },
        { id: 4, name: 'ค่าสมาชิก Gym', amount: 1200.00, schedule: 'ทุกวันที่ 5 ของเดือน', active: false }
      ],
      goals: [
        { id: 1, name: 'เที่ยวญี่ปุ่น', target: 50000, saved: 23450 },
        { id: 2, name: 'เงินสำรองฉุกเฉิน', target: 100000, saved: 65000 },
        { id: 3, name: 'ซื้อคอมพิวเตอร์', target: 40000, saved: 12300 }
      ]
    };

    // โหลดข้อมูลเก่า หรือใช้ข้อมูลตั้งต้นถ้ายังไม่มีข้อมูล
    let appState = JSON.parse(localStorage.getItem('money_nest_db')) || DEFAULT_STATE;

    function saveToStorage() {
      localStorage.setItem('money_nest_db', JSON.stringify(appState));
    }

    function formatNum(num) {
      return Number(num).toLocaleString('th-TH', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    /* ================= ROUTING & VIEW CONTROLLER ================= */
    let currentView = 'home';
    let currentAddType = 'expense'; // expense หรือ income
    let selectedCategory = 'อาหาร';

    function switchView(viewName) {
      currentView = viewName;
      
      // อัปเดตสถานะของแท็บนำทางล่าง
      document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
      const activeNav = document.getElementById(`nav-${viewName}`);
      if (activeNav) activeNav.classList.add('active');

      const container = document.getElementById('view-container');
      
      switch(viewName) {
        case 'home':
          renderHome(container);
          break;
        case 'report':
          renderReport(container);
          break;
        case 'add':
          renderAddTx(container);
          break;
        case 'features':
          renderFeaturesMenu(container);
          break;
        case 'bills':
          renderBills(container);
          break;
        case 'debts':
          renderDebts(container);
          break;
        case 'recurring':
          renderRecurring(container);
          break;
        case 'goals':
          renderGoals(container);
          break;
        case 'settings':
          renderSettings(container);
          break;
      }
      container.scrollTop = 0;
    }

    /* ================= RENDER TEMPLATES ================= */

    // 1. หน้าหลัก (Home)
    function renderHome(container) {
      container.innerHTML = `
        <div class="greeting-box">
          <div class="greeting-text">
            <h2>สวัสดีตอนเช้า ☀️</h2>
            <p>วันนี้สู้ๆ นะคนเก่ง!</p>
          </div>
          <span style="font-size: 28px;">🐣</span>
        </div>

        <div class="card balance-banner" style="border-radius: 24px; overflow:hidden;">
          <p>เงินคงเหลือทั้งหมด</p>
          <h2>฿ ${formatNum(appState.balance)}</h2>
          <div class="sub-stats">
            <div class="sub-stat-item">
              <span>รายรับเดือนนี้</span>
              <strong>฿ ${formatNum(appState.totalIncome)}</strong>
            </div>
            <div class="sub-stat-item">
              <span>รายจ่ายเดือนนี้</span>
              <strong>฿ ${formatNum(appState.totalExpense)}</strong>
            </div>
          </div>
        </div>

        <div class="quick-menu-grid">
          <div class="quick-box inc" onclick="currentAddType='income'; switchView('add');">💰 รายรับ</div>
          <div class="quick-box exp" onclick="currentAddType='expense'; switchView('add');">💸 รายจ่าย</div>
          <div class="quick-box bill" onclick="switchView('bills');">📅 บิลวันนี้</div>
        </div>

        <div class="card">
          <div class="section-header">
            <div class="section-title">📊 ภาพรวมเดือนนี้</div>
            <span style="font-size:11px; color:var(--gray-text);">พฤษภาคม 2569</span>
          </div>
          <div class="summary-row">
            <span class="label">🟢 รายรับทั้งหมด</span>
            <span class="val-inc">${formatNum(appState.totalIncome)}</span>
          </div>
          <div class="summary-row">
            <span class="label">🔴 รายจ่ายทั้งหมด</span>
            <span class="val-exp">${formatNum(appState.totalExpense)}</span>
          </div>
          <div class="summary-row" style="margin-top: 6px; padding-top: 12px; border-top: 1px solid #edf5f1;">
            <span class="label" style="color:var(--dark-text); font-weight:600;">คงเหลือ</span>
            <span class="val-bal">฿ ${formatNum(appState.balance)}</span>
          </div>
        </div>

        <div class="card">
          <div class="section-title" style="margin-bottom: 12px;">📝 รายการล่าสุดวันนี้</div>
          ${appState.transactions.length === 0 ? '<p style="text-align:center; font-size:12px; color:var(--gray-text); padding:10px;">ยังไม่มีรายการของวันนี้</p>' : ''}
          ${appState.transactions.map(t => `
            <div style="display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid #f8faf9;">
              <div>
                <div style="font-size:13px; font-weight:500;">${t.category} ${t.note ? `<span style="font-size:11px; color:var(--gray-text); font-weight:400;">(${t.note})</span>` : ''}</div>
                <div style="font-size:10px; color:var(--gray-text);">${t.date}</div>
              </div>
              <span style="font-size:14px; font-weight:600; color:${t.type === 'income' ? 'var(--primary)' : '#e74c3c'}">
                ${t.type === 'income' ? '+' : '-'}฿${formatNum(t.amount)}
              </span>
            </div>
          `).join('')}
        </div>
      `;
    }

    // 2. หน้าสรุปรายงานเชิงวิเคราะห์ (Reports)
    function renderReport(container) {
      container.innerHTML = `
        <div class="card">
          <div class="section-title" style="margin-bottom:12px;">📊 สรุปรายงานค่าใช้จ่ายประจำปี</div>
          <div class="report-tabs">
            <button class="report-tab-btn">รายวัน</button>
            <button class="report-tab-btn active">รายเดือน</button>
            <button class="report-tab-btn">รายปี</button>
          </div>
          
          <div class="chart-mockup">
            <div class="chart-bar-wrapper"><div class="chart-bar" style="height: 40px;"></div><span class="chart-label">ม.ค.</span></div>
            <div class="chart-bar-wrapper"><div class="chart-bar" style="height: 55px;"></div><span class="chart-label">ก.พ.</span></div>
            <div class="chart-bar-wrapper"><div class="chart-bar" style="height: 30px;"></div><span class="chart-label">มี.ค.</span></div>
            <div class="chart-bar-wrapper"><div class="chart-bar" style="height: 75px;"></div><span class="chart-label">เม.ย.</span></div>
            <div class="chart-bar-wrapper"><div class="chart-bar exp" style="height: 90px;"></div><span class="chart-label" style="color:var(--primary); font-weight:600;">พ.ค.</span></div>
          </div>
        </div>

        <div class="card">
          <div class="section-title" style="margin-bottom:14px;">🍰 แยกตามหมวดหมู่รายจ่าย</div>
          
          <div class="cat-report-row">
            <span class="cat-report-name">🍔 อาหาร</span>
            <div class="cat-report-bar-bg"><div class="cat-report-bar-fill" style="width: 35%; background-color:#66C7A0;"></div></div>
            <span class="cat-report-amt">35%</span>
          </div>
          <div class="cat-report-row">
            <span class="cat-report-name">🏠 บ้าน</span>
            <div class="cat-report-bar-bg"><div class="cat-report-bar-fill" style="width: 25%; background-color:#A7E3C2;"></div></div>
            <span class="cat-report-amt">25%</span>
          </div>
          <div class="cat-report-row">
            <span class="cat-report-name">🚌 เดินทาง</span>
            <div class="cat-report-bar-bg"><div class="cat-report-bar-fill" style="width: 15%; background-color:#FFB4C1;"></div></div>
            <span class="cat-report-amt">15%</span>
          </div>
          <div class="cat-report-row">
            <span class="cat-report-name">🛍️ ช้อปปิ้ง</span>
            <div class="cat-report-bar-bg"><div class="cat-report-bar-fill" style="width: 10%; background-color:#FFF7E6;"></div></div>
            <span class="cat-report-amt">10%</span>
          </div>
          <div class="cat-report-row">
            <span class="cat-report-name">✨ อื่นๆ</span>
            <div class="cat-report-bar-bg"><div class="cat-report-bar-fill" style="width: 15%; background-color:#8E8E93;"></div></div>
            <span class="cat-report-amt">15%</span>
          </div>
        </div>
      `;
    }

    // 3. หน้าลงบันทึกบัญชี (Add Transaction)
    function renderAddTx(container) {
      const expCategories = [
        { name: 'อาหาร', icon: '🍔' }, { name: 'เดินทาง', icon: '🚌' },
        { name: 'บ้าน', icon: '🏠' }, { name: 'ผ่อนชำระ', icon: '💳' },
        { name: 'ช้อปปิ้ง', icon: '🛍️' }, { name: 'สุขภาพ', icon: '💊' },
        { name: 'บันเทิง', icon: '🎬' }, { name: 'อื่นๆ', icon: '✨' }
      ];

      const incCategories = [
        { name: 'เงินเดือน', icon: '💼' }, { name: 'ฟรีแลนซ์', icon: '💻' },
        { name: 'ลงทุน', icon: '📈' }, { name: 'อื่นๆ', icon: '✨' }
      ];

      const activeCategories = currentAddType === 'expense' ? expCategories : incCategories;

      container.innerHTML = `
        <div class="card">
          <div class="tab-toggle-container">
            <button class="tab-toggle-btn ${currentAddType === 'expense' ? 'active' : ''}" onclick="setAddType('expense')">บันทึกรายจ่าย</button>
            <button class="tab-toggle-btn ${currentAddType === 'income' ? 'active' : ''}" onclick="setAddType('income')">บันทึกรายรับ</button>
          </div>

          <div class="form-group">
            <label>จำนวนเงิน (บาท)</label>
            <input type="number" id="tx-amount" class="form-control" placeholder="0.00" step="any" required>
          </div>

          <div class="form-group">
            <label>หมวดหมู่</label>
            <div class="category-grid">
              ${activeCategories.map(cat => `
                <div class="cat-item ${selectedCategory === cat.name ? 'active' : ''}" onclick="selectCat('${cat.name}')">
                  <span class="cat-icon">${cat.icon}</span>
                  <span>${cat.name}</span>
                </div>
              `).join('')}
            </div>
          </div>

          <div class="form-group">
            <label>บันทึกเพิ่มเติม (ไม่บังคับ)</label>
            <input type="text" id="tx-note" class="form-control" placeholder="ระบุรายละเอียดสั้นๆ...">
          </div>

          <div class="form-group">
            <label>วันที่ทำรายการ</label>
            <input type="date" id="tx-date" class="form-control" value="${new Date().toISOString().split('T')[0]}">
          </div>

          <button class="btn-primary" onclick="submitTransaction()" style="margin-top:10px;">💾 บันทึกรายการ</button>
        </div>
      `;
    }

    function setAddType(type) {
      currentAddType = type;
      selectedCategory = type === 'expense' ? 'อาหาร' : 'เงินเดือน';
      renderAddTx(document.getElementById('view-container'));
    }

    function selectCat(catName) {
      selectedCategory = catName;
      renderAddTx(document.getElementById('view-container'));
    }

    function submitTransaction() {
      const amtEl = document.getElementById('tx-amount');
      const noteEl = document.getElementById('tx-note');
      const dateEl = document.getElementById('tx-date');

      const amount = parseFloat(amtEl.value);
      if (!amount || amount <= 0) {
        alert('กรุณากรอกจำนวนเงินให้ถูกต้องก่อนบันทึกนะครับ');
        return;
      }

      const newTx = {
        id: Date.now(),
        type: currentAddType,
        amount: amount,
        category: selectedCategory,
        date: dateEl.value,
        note: noteEl.value.trim()
      };

      appState.transactions.unshift(newTx);

      // คำนวณยอดเงินรวมใหม่ใน State บัญชี
      if (currentAddType === 'expense') {
        appState.balance -= amount;
        appState.totalExpense += amount;
      } else {
        appState.balance += amount;
        appState.totalIncome += amount;
      }

      saveToStorage();
      alert('บันทึกยอดลงสมุดบัญชี MoneyNest เรียบร้อยแล้ว!');
      switchView('home');
    }

    // 4. หน้าศูนย์รวมฟีเจอร์ย่อย (Features Sub-Menu)
    function renderFeaturesMenu(container) {
      container.innerHTML = `
        <div class="card" style="padding:10px;">
          <div class="setting-item" onclick="switchView('bills')">
            <span>📅 บิลที่ต้องจ่ายวันนี้</span>
            <span class="arrow-r">▶</span>
          </div>
          <div class="setting-item" onclick="switchView('debts')">
            <span>🤝 จัดการรายการหนี้สิน</span>
            <span class="arrow-r">▶</span>
          </div>
          <div class="setting-item" onclick="switchView('recurring')">
            <span>🔁 จัดการรายจ่ายประจำเดือน</span>
            <span class="arrow-r">▶</span>
          </div>
          <div class="setting-item" onclick="switchView('goals')">
            <span>🎯 เป้าหมายการออมเงิน</span>
            <span class="arrow-r">▶</span>
          </div>
        </div>
      `;
    }

    // 4.1 ฟีเจอร์ย่อย: บิลวันนี้ (Bills View)
    function renderBills(container) {
      let totalUnpaid = appState.bills.reduce((sum, b) => b.status === 'unpaid' ? sum + b.amount : sum, 0);
      
      container.innerHTML = `
        <div class="card">
          <div class="section-header">
            <div class="section-title">📅 บิลวันนี้</div>
            <span style="font-size:12px; color:var(--gray-text);">18 พฤษภาคม 2569</span>
          </div>
          
          ${appState.bills.map(b => `
            <div class="bill-item">
              <div class="bill-info">
                <h4>${b.name}</h4>
                <span>กำหนดส่งท้ายวัน</span>
              </div>
              <div class="bill-status">
                <div class="bill-amt">฿${formatNum(b.amount)}</div>
                <span class="status-badge ${b.status}" onclick="toggleBillStatus(${b.id})">
                  ${b.status === 'unpaid' ? '❌ ค้างชำระ (คลิกเพื่อจ่าย)' : '✅ จ่ายแล้ว'}
                </span>
              </div>
            </div>
          `).join('')}

          <div style="margin-top: 16px; display:flex; justify-content:space-between; font-weight:600; font-size:14px;">
            <span>รวมยอดค้างชำระวันนี้:</span>
            <span style="color:#e74c3c;">฿${formatNum(totalUnpaid)}</span>
          </div>
        </div>
        <button class="btn-primary" onclick="payAllBills()">💳 จ่ายค้างชำระทั้งหมด</button>
      `;
    }

    function toggleBillStatus(id) {
      const bill = appState.bills.find(b => b.id === id);
      if(bill && bill.status === 'unpaid') {
        bill.status = 'paid';
        appState.balance -= bill.amount;
        appState.totalExpense += bill.amount;
        saveToStorage();
        renderBills(document.getElementById('view-container'));
      }
    }

    function payAllBills() {
      appState.bills.forEach(bill => {
        if(bill.status === 'unpaid') {
          bill.status = 'paid';
          appState.balance -= bill.amount;
          appState.totalExpense += bill.amount;
        }
      });
      saveToStorage();
      alert('ชำระบิลค้างจ่ายทั้งหมดเรียบร้อย!');
      renderBills(document.getElementById('view-container'));
    }

    // 4.2 ฟีเจอร์ย่อย: หนี้สิน (Debts View)
    function renderDebts(container) {
      const d = appState.debt;
      const progressPercent = Math.round((d.paid / d.total) * 100);

      container.innerHTML = `
        <div class="card">
          <div class="section-title" style="margin-bottom:14px;">🤝 รายการหนี้สิน</div>
          <div class="debt-profile">
            <div class="debt-avatar">👩</div>
            <div>
              <h4 style="font-size:15px;">${d.lender}</h4>
              <p style="font-size:11px; color:var(--gray-text);">กู้ยืมเมื่อ: ${d.date}</p>
            </div>
          </div>

          <div class="progress-wrapper">
            <div class="progress-bar-bg">
              <div class="progress-bar-fill" style="width: ${progressPercent}%;"></div>
            </div>
            <div class="progress-text">
              <span>ยอดกู้ทั้งหมด: ฿${formatNum(d.total)}</span>
              <span>คืนแล้ว ${progressPercent}%</span>
            </div>
          </div>

          <div style="display:flex; justify-content:space-between; font-size:14px; margin-top:10px;">
            <span style="color:var(--gray-text)">ยอดคงเหลือผ่อน:</span>
            <span style="color:#e74c3c; font-weight:700;">฿${formatNum(d.remaining)}</span>
          </div>
        </div>

        <div class="card">
          <div class="section-title">🗓️ ประวัติผ่อนชำระค้างงวด</div>
          <div class="history-list">
            ${d.history.map(h => `
              <div class="history-item">
                <span><strong>${h.period}</strong> (${h.date})</span>
                <span style="color:var(--primary); font-weight:600;">฿${formatNum(h.amount)}</span>
              </div>
            `).join('')}
          </div>
        </div>

        <button class="btn-primary" onclick="payDebtInstallment()">＋ บันทึกการจ่ายงวดถัดไป (10,000 บาท)</button>
      `;
    }

    function payDebtInstallment() {
      if(appState.debt.remaining <= 0) {
        alert('คุณชำระหนี้สินก้อนนี้หมดครบถ้วนแล้วครับ!');
        return;
      }
      
      const nextInstallmentNum = appState.debt.history.length + 1;
      const paymentAmount = 10000.00;

      appState.debt.paid += paymentAmount;
      appState.debt.remaining -= paymentAmount;
      appState.balance -= paymentAmount;
      appState.totalExpense += paymentAmount;

      appState.debt.history.unshift({
        period: `งวดที่ ${nextInstallmentNum}`,
        date: 'วันนี้',
        amount: paymentAmount
      });

      saveToStorage();
      alert('บันทึกการส่งเงินงวดคืนหนี้สินแล้ว');
      renderDebts(document.getElementById('view-container'));
    }

    // 4.3 ฟีเจอร์ย่อย: รายจ่ายประจำ (Recurring View)
    function renderRecurring(container) {
      container.innerHTML = `
        <div class="card">
          <div class="section-title" style="margin-bottom:12px;">🔁 รายจ่ายประจำระบบออโต้</div>
          
          ${appState.recurring.map(r => `
            <div style="display:flex; justify-content:space-between; align-items:center; padding:12px 0; border-bottom:1px solid #f1f8f5;">
              <div>
                <h4 style="font-size:14px; font-weight:600;">${r.name}</h4>
                <p style="font-size:11px; color:var(--gray-text);">${r.schedule}</p>
                <p style="font-size:13px; font-weight:500; color:var(--primary); margin-top:2px;">฿${formatNum(r.amount)}</p>
              </div>
              <div>
                <label class="switch-container">
                  <input type="checkbox" ${r.active ? 'checked' : ''} onchange="toggleRecurringActive(${r.id})">
                  <span class="slider"></span>
                </label>
              </div>
            </div>
          `).join('')}
        </div>
        <button class="btn-primary" onclick="alert('ฟีเจอร์เพิ่มรายการประจำใหม่ จะเปิดให้อัปเดตในแพตช์ถัดไปครับ')">＋ เพิ่มรายการตัดรอบประจำ</button>
      `;
    }

    function toggleRecurringActive(id) {
      const item = appState.recurring.find(r => r.id === id);
      if(item) {
        item.active = !item.active;
        saveToStorage();
      }
    }

    // 4.4 ฟีเจอร์ย่อย: เป้าหมาย (Goals View)
    function renderGoals(container) {
      container.innerHTML = `
        <div class="section-title" style="margin: 4px 0 12px 6px;">🎯 เป้าหมายการออมเงินกองกลาง</div>
        
        ${appState.goals.map((g, index) => {
          const percent = Math.min(100, Math.round((g.saved / g.target) * 100));
          return `
            <div class="card goal-card g${(index % 3) + 1}">
              <div style="display:flex; justify-content:space-between; font-weight:600; font-size:14px; margin-bottom:6px;">
                <span>🗻 ${g.name}</span>
                <span style="color:var(--primary)">${percent}%</span>
              </div>
              <div class="progress-bar-bg" style="height:6px; margin:8px 0;">
                <div class="progress-bar-fill" style="width: ${percent}%; background-color: var(--primary);"></div>
              </div>
              <div style="display:flex; justify-content:space-between; font-size:11px; color:var(--gray-text);">
                <span>เก็บแล้ว: ฿${formatNum(g.saved)}</span>
                <span>เป้าหมาย: ฿${formatNum(g.target)}</span>
              </div>
              <button style="margin-top:10px; width:100%; border:1px solid #ddd; background:none; padding:4px; font-size:11px; border-radius:6px; cursor:pointer;" onclick="addSavingsToGoals(${g.id})">➕ ฝากเงินเพิ่มก้อนนี้</button>
            </div>
          `;
        }).join('')}
      `;
    }

    function addSavingsToGoals(id) {
      const goal = appState.goals.find(g => g.id === id);
      if(goal) {
        const amtStr = prompt(`กรุณากรอกจำนวนเงินออมที่จะสมทบเข้าช่อง "${goal.name}":`, "1000");
        const amt = parseFloat(amtStr);
        if(amt && amt > 0) {
          if(appState.balance < amt) {
            alert('ยอดคงเหลือกระเป๋าหลักของคุณมีไม่เพียงพอให้ย้ายไปเงินออมครับ');
            return;
          }
          goal.saved += amt;
          appState.balance -= amt;
          appState.totalExpense += amt; // ตีเป็นยอดลงทุนหรือโอนออกชั่วคราว
          saveToStorage();
          renderGoals(document.getElementById('view-container'));
        }
      }
    }

    // 5. หน้าตั้งค่าระบบ (Settings)
    function renderSettings(container) {
      container.innerHTML = `
        <div class="card" style="padding: 10px;">
          <div class="setting-item">
            <span>👤 ข้อมูลโปรไฟล์ส่วนตัว</span>
            <span class="arrow-r">▶</span>
          </div>
          <div class="setting-item">
            <span>💱 สกุลเงินแสดงผล</span>
            <span style="font-size:12px; color:var(--gray-text)">THB (บาท)</span>
          </div>
          <div class="setting-item">
            <span>🔔 ตั้งค่าเปิดรับการแจ้งเตือน</span>
            <span class="arrow-r">▶</span>
          </div>
          <div class="setting-item" onclick="resetSystemData()">
            <span style="color:#e74c3c;">🔄 รีเซ็ตข้อมูลระบบเริ่มต้นทั้งหมด</span>
            <span class="arrow-r">▶</span>
          </div>
        </div>
        
        <p style="text-align:center; font-size:11px; color:var(--gray-text); margin-top:20px;">MoneyNest Web WebApp v1.0.0 (Standalone)</p>
      `;
    }

    function resetSystemData() {
      if(confirm('คุณแน่ใจใช่ไหมครับว่าต้องการล้างข้อมูลและประวัติการทำธุรกรรมทั้งหมด กลับเป็นค่าโรงงานเริ่มต้นในรูปภาพ?')) {
        localStorage.removeItem('money_nest_db');
        appState = JSON.parse(JSON.stringify(DEFAULT_STATE));
        saveToStorage();
        switchView('home');
        alert('ระบบรีเซ็ตกลับเป็นข้อมูลตั้งต้นเรียบร้อยแล้วครับ');
      }
    }

    /* ================= INITIAL WORKFLOW SYSTEM LAUNCH ================= */
    // เปิดตัวโปรแกรมเข้าสู่หน้าหลักเมื่อโหลดเสร็จ
    switchView('home');
  </script>
</body>
