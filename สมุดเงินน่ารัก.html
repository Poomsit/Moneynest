<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MoneyNest v4</title>

<style>
:root{
  --bg:#0b1220;
  --card:#111b2e;
  --green:#22c55e;
  --red:#ef4444;
  --blue:#60a5fa;
  --text:#e5e7eb;
  --muted:#94a3b8;
}

body{
  margin:0;
  font-family:system-ui;
  background:var(--bg);
  color:var(--text);
}

.container{
  max-width:430px;
  margin:auto;
  padding:14px;
}

.header{
  background:linear-gradient(135deg,#16a34a,#22c55e);
  padding:16px;
  border-radius:18px;
}

.balance{
  font-size:24px;
  font-weight:bold;
}

/* CARDS */
.card{
  background:var(--card);
  padding:12px;
  border-radius:14px;
  margin-top:10px;
}

input, select{
  width:100%;
  padding:10px;
  margin-top:8px;
  border:none;
  border-radius:10px;
  background:#0f1a2b;
  color:white;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  margin-top:10px;
  font-weight:bold;
  cursor:pointer;
}

.income{ background:#22c55e; color:white; }
.expense{ background:#ef4444; color:white; }
.goal{ background:#60a5fa; color:white; }

/* GOAL CARD */
.goal-card{
  background:var(--card);
  padding:12px;
  border-radius:14px;
  margin-top:10px;
}

.bar{
  height:10px;
  background:#1f2937;
  border-radius:20px;
  overflow:hidden;
  margin-top:8px;
}

.bar-fill{
  height:100%;
  background:linear-gradient(90deg,#60a5fa,#22c55e);
}

/* LIST */
.item{
  display:flex;
  justify-content:space-between;
  padding:8px;
  border-bottom:1px solid #1f2937;
}
.small{ font-size:12px; color:var(--muted); }
</style>
</head>

<body>

<div class="container">

  <div class="header">
    <div>💚 MoneyNest</div>
    <div class="balance" id="balance">0 THB</div>
  </div>

  <!-- TRANSACTION -->
  <div class="card">
    <input id="amount" placeholder="จำนวนเงิน">
    <input id="note" placeholder="หมายเหตุ">

    <button class="income" onclick="add('income')">+ รายรับ</button>
    <button class="expense" onclick="add('expense')">- รายจ่าย</button>
  </div>

  <!-- GOALS -->
  <div class="card">
    <h3>🎯 เป้าหมาย</h3>

    <input id="gname" placeholder="ชื่อเป้าหมาย (เช่น ไปญี่ปุ่น)">
    <input id="gtarget" placeholder="เป้าหมายเงิน">

    <button class="goal" onclick="addGoal()">+ เพิ่มเป้าหมาย</button>
  </div>

  <div id="goals"></div>

  <!-- LIST -->
  <div class="card">
    <h3>📜 รายการ</h3>
    <div id="list"></div>
  </div>

</div>

<script>
let data = JSON.parse(localStorage.getItem("mn_v4")) || [];
let goals = JSON.parse(localStorage.getItem("mn_goal")) || [];

function save(){
  localStorage.setItem("mn_v4", JSON.stringify(data));
  localStorage.setItem("mn_goal", JSON.stringify(goals));
  render();
}

function add(type){
  let amt = Number(document.getElementById("amount").value);
  let note = document.getElementById("note").value;

  if(!amt) return;

  data.push({type, amt, note, time:new Date().toLocaleString()});

  document.getElementById("amount").value="";
  document.getElementById("note").value="";

  save();
}

function addGoal(){
  let name = document.getElementById("gname").value;
  let target = Number(document.getElementById("gtarget").value);

  if(!name || !target) return;

  goals.push({
    name,
    target,
    saved:0
  });

  document.getElementById("gname").value="";
  document.getElementById("gtarget").value="";

  save();
}

function addToGoal(i){
  let amt = prompt("เพิ่มเงินเข้าเป้าหมาย:");
  if(!amt) return;

  goals[i].saved += Number(amt);
  save();
}

function render(){

  // BALANCE
  let bal=0;
  let html="";

  data.slice().reverse().forEach(d=>{
    if(d.type==="income") bal+=d.amt;
    else bal-=d.amt;

    html += `
      <div class="item">
        <div>
          ${d.note || "-"}
          <div class="small">${d.time}</div>
        </div>
        <div style="color:${d.type==='income'?'#22c55e':'#ef4444'}">
          ${d.type==='income'?'+':'-'}${d.amt}
        </div>
      </div>
    `;
  });

  document.getElementById("balance").innerText = "฿"+bal;

  // GOALS
  let ghtml="";

  goals.forEach((g,i)=>{
    let percent = Math.min(100,(g.saved/g.target)*100);

    ghtml += `
      <div class="goal-card">
        <b>${g.name}</b>

        <div class="small">
          ${g.saved} / ${g.target} THB (${percent.toFixed(0)}%)
        </div>

        <div class="bar">
          <div class="bar-fill" style="width:${percent}%"></div>
        </div>

        <button class="goal" onclick="addToGoal(${i})">
          + เพิ่มเงินเข้าเป้าหมาย
        </button>
      </div>
    `;
  });

  document.getElementById("goals").innerHTML = ghtml;
  document.getElementById("list").innerHTML = html;
}

render();
</script>

</body>
</html>
